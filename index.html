const generateRecurringShifts = (month, year, staffList) => {
  const result = [];
  const days = getDaysInMonth(year, month);
  let weekNum = 0;
  for (let day = 1; day <= days; day++) {
    const dow = new Date(year, month, day).getDay();
    if (dow === 1) weekNum++;
    if (dow === 0 || dow === 6) continue;
    const wk = Math.min(weekNum, 4) - 1;
    const mRot = MORNING_ROTATION[Math.max(wk, 0)] || MORNING_ROTATION[0];
    const aRot = AFTERNOON_ROTATION[Math.max(wk, 0)] || AFTERNOON_ROTATION[0];
    MORNING_STAFF.forEach((sd, i) => {
      const member = staffList.find(s => s.name === sd.name);
      if (!member) return;
      result.push({ id: genId(), staffId: member.id, day, month, year, shiftType: sd.shiftType, shiftLabel: sd.shiftLabel, shiftTime: sd.shiftTime, station: mRot[i] || "H - Hospital", note: "", recurring: true });
    });
    AFTERNOON_STAFF.forEach((sd, i) => {
      const member = staffList.find(s => s.name === sd.name);
      if (!member) return;
      result.push({ id: genId(), staffId: member.id, day, month, year, shiftType: sd.shiftType, shiftLabel: sd.shiftLabel, shiftTime: sd.shiftTime, station: aRot[i] || "M - Middle", note: "", recurring: true });
    });
  }
  return result;
};

  }, []);

        <div>
          <div style={{ fontWeight: 500, fontSize: 14 }}>Fourways Vet Hospital</div>

  };
  const StandbyBadge = ({ small }) => <div style={{ background: SBC.bg, color: SBC.text, borderLeft: "3px solid " + SBC.border, borderRadius: small ? 4 : 6, padding: small ? "2px 4px" : "5px 8px", fontSize: small ? 9 : 11, fontWeight: 500, marginBottom: 2 }}>{small ? "SB" : "Standby"}</div>;

      <div style={{ ...base, minHeight: 400, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16 }}>
        <div style={{ background: FVH_BLUE, borderRadius: 12, width: 56, height: 56, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <span style={{ color: "#fff", fontWeight: 800, fontSize: 16 }}>FVH</span>
        </div>
        <div style={{ fontSize: 14, color: "#888" }}>Connecting to database...</div>
      </div>

  }

  if (!currentUser) {
    return (
      <div style={{ ...base, minHeight: 500, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ width: 360, background: "#fff", borderRadius: 16, padding: 28, boxShadow: "0 4px 24px rgba(30,58,110,0.12)" }}>
          <div style={{ background: FVH_BLUE, borderRadius: 10, padding: "24px 20px", textAlign: "center", marginBottom: 24 }}>
            <div style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", background: "rgba(255,255,255,0.15)", borderRadius: 12, width: 56, height: 56, marginBottom: 12 }}>

            </div>
            <div style={{ color: "#fff", fontWeight: 700, fontSize: 18 }}>Fourways Vet Hospital</div>
            <div style={{ color: "rgba(255,255,255,0.7)", fontSize: 11, marginTop: 3 }}>& Specialist Referral Centre</div>
            <div style={{ marginTop: 10 }}><span style={{ background: "rgba(255,255,255,0.2)", color: "#fff", borderRadius: 20, padding: "3px 14px", fontSize: 11 }}>Reception Shift Manager</span></div>

          <div style={{ fontWeight: 600, fontSize: 16, marginBottom: 2 }}>Welcome back</div>
          <div style={{ fontSize: 12, color: "#888", marginBottom: 16 }}>Sign in to view your shifts</div>

            <div key={key} style={{ marginBottom: 14 }}>
              <label style={{ fontSize: 12, color: "#555", display: "block", marginBottom: 4 }}>{label}</label>

            </div>

          <button style={{ ...btn(true), width: "100%", padding: 11, fontSize: 14 }} onClick={login}>Sign In</button>
          <div style={{ marginTop: 16, fontSize: 11, color: "#999", textAlign: "center", lineHeight: 1.8 }}>
            Admin: <strong>admin</strong> / <strong>admin123</strong><br />
            Vet: <strong>Vet Login</strong> / <strong>0001</strong><br />
            Nurse: <strong>Nurse Login</strong> / <strong>0002</strong>
          </div>
        </div>
      </div>
    );
  }

  if (currentUser.role === "receptionist") {
    const uid = currentUser.id;
    const myShifts = getMyShifts(uid);
    const myStandbys = getMyStandbys(uid);
    const thisMonthShifts = myShifts.filter(s => s.month === today.getMonth() && s.year === today.getFullYear());
    let totalHours = 0;
    thisMonthShifts.forEach(sh => { const ev = clockEvents.find(c => c.shiftId === sh.id && c.clockOut); if (ev) totalHours += calcHours(ev.clockIn, ev.clockOut); });
    const nextShift = myShifts.filter(s => new Date(s.year, s.month, s.day) >= new Date(today.getFullYear(), today.getMonth(), today.getDate())).sort((a, b) => new Date(a.year, a.month, a.day) - new Date(b.year, b.month, b.day))[0];
    const nextEv = nextShift ? clockEvents.find(c => c.shiftId === nextShift.id) : null;
    const daysInMonth = getDaysInMonth(viewYear, viewMonth);
    const firstDay = getFirstDay(viewYear, viewMonth);
    const cells = []; for (let i = 0; i < firstDay; i++) cells.push(null); for (let d = 1; d <= daysInMonth; d++) cells.push(d);
    const weekStart = getWeekStart(new Date(today.getFullYear(), today.getMonth(), today.getDate() + weekOffset * 7));
    const weekDays = Array.from({ length: 7 }, (_, i) => { const d = new Date(weekStart); d.setDate(d.getDate() + i); return d; });

    return (
      <div style={{ ...base }}>
        <FVHHeader />
        <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: 16 }}>

        </div>

        {recepTab === "overview" && (
          <div>
            <div style={{ background: "linear-gradient(135deg, " + FVH_BLUE + " 0%, #2d5299 100%)", borderRadius: 14, padding: "18px 20px", marginBottom: 16, color: "#fff" }}>
              <div style={{ fontSize: 13, opacity: 0.8, marginBottom: 4 }}>{today.toLocaleDateString("en-ZA", { weekday: "long", day: "numeric", month: "long" })}</div>
              <div style={{ fontSize: 20, fontWeight: 600, marginBottom: 12 }}>Good {today.getHours() < 12 ? "morning" : today.getHours() < 17 ? "afternoon" : "evening"}, {currentUser.name.split(" ")[0]}</div>
              {nextShift ? (
                <div style={{ background: "rgba(255,255,255,0.15)", borderRadius: 10, padding: "10px 14px" }}>
                  <div style={{ fontSize: 11, opacity: 0.75, marginBottom: 4 }}>Your next shift</div>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>{new Date(nextShift.year, nextShift.month, nextShift.day).toLocaleDateString("en-ZA", { weekday: "long", day: "numeric", month: "short" })}</div>
                  <div style={{ fontSize: 12, opacity: 0.85 }}>{nextShift.shiftLabel} - {nextShift.shiftTime} - {nextShift.station}</div>
                  {!nextEv && <button style={{ marginTop: 8, background: "#fff", color: FVH_BLUE, border: "none", borderRadius: 7, padding: "5px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer" }} onClick={() => clockIn(nextShift.id)}>Clock In Now</button>}
                  {nextEv && !nextEv.clockOut && <button style={{ marginTop: 8, background: "rgba(255,255,255,0.25)", color: "#fff", border: "1px solid rgba(255,255,255,0.4)", borderRadius: 7, padding: "5px 14px", fontSize: 12, cursor: "pointer" }} onClick={() => clockOutFn(nextShift.id)}>Clock Out</button>}
                  {nextEv && nextEv.approved && <span style={{ marginTop: 8, display: "inline-block", background: "rgba(16,185,129,0.3)", color: "#6ee7b7", borderRadius: 6, padding: "3px 10px", fontSize: 11 }}>Approved</span>}
                </div>
              ) : <div style={{ background: "rgba(255,255,255,0.15)", borderRadius: 10, padding: "10px 14px", fontSize: 13, opacity: 0.85 }}>No upcoming shifts</div>}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 10, marginBottom: 16 }}>
              {[["Shifts this month", thisMonthShifts.length], ["Hours worked", totalHours.toFixed(1)], ["Pending approval", clockEvents.filter(c => { const sh = myShifts.find(s => s.id === c.shiftId); return sh && c.clockOut && !c.approved; }).length]].map(([label, value]) => (
                <div key={label} style={{ background: "#f0f3fa", borderRadius: 10, padding: "12px 14px", textAlign: "center" }}>
                  <div style={{ fontSize: 22, fontWeight: 600, color: FVH_BLUE }}>{value}</div>
                  <div style={{ fontSize: 10, color: "#888", marginTop: 2 }}>{label}</div>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 16 }}>
              {Object.values(SC).map(col => <div key={col.label} style={{ background: col.bg, borderRadius: 6, padding: "4px 10px", fontSize: 11, color: col.text, fontWeight: 500 }}>{col.label}</div>)}
              <div style={{ background: SBC.bg, borderRadius: 6, padding: "4px 10px", fontSize: 11, color: SBC.text, fontWeight: 500 }}>Standby</div>
            </div>
            <div style={{ fontWeight: 500, marginBottom: 8, fontSize: 13, color: "#888" }}>UPCOMING SHIFTS</div>
            {myShifts.filter(s => new Date(s.year, s.month, s.day) >= new Date(today.getFullYear(), today.getMonth(), today.getDate())).sort((a, b) => new Date(a.year, a.month, a.day) - new Date(b.year, b.month, b.day)).slice(0, 5).map(sh => {
              const col = getShiftColor(sh.shiftType, sh.year, sh.month, sh.day);
              const ev = clockEvents.find(c => c.shiftId === sh.id);
              return (
                <div key={sh.id} style={{ ...card, borderLeft: "4px solid " + col.border }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <div style={{ fontWeight: 500, fontSize: 13 }}>{new Date(sh.year, sh.month, sh.day).toLocaleDateString("en-ZA", { weekday: "short", day: "numeric", month: "short" })}</div>
                      <div style={{ fontSize: 12, color: col.text }}>{col.label} - {sh.shiftLabel} - {sh.shiftTime}</div>
                      <div style={{ fontSize: 11, color: "#888" }}>{sh.station}</div>
                    </div>
                    <div>
                      {ev && ev.approved && <span style={tag("#0f6e56")}>Approved</span>}
                      {ev && ev.clockOut && !ev.approved && <span style={tag("#378add")}>Awaiting</span>}
                      {ev && ev.clockIn && !ev.clockOut && <button style={{ ...btn(false), fontSize: 11 }} onClick={() => clockOutFn(sh.id)}>Clock Out</button>}
                      {!ev && <button style={{ ...btn(true), fontSize: 11 }} onClick={() => clockIn(sh.id)}>Clock In</button>}
                    </div>
                  </div>
                </div>
              );
            })}
            {myShifts.filter(s => new Date(s.year, s.month, s.day) >= new Date(today.getFullYear(), today.getMonth(), today.getDate())).length === 0 && <div style={{ color: "#888", fontSize: 13 }}>No upcoming shifts</div>}
            {myStandbys.filter(s => new Date(s.year, s.month, s.day) >= new Date(today.getFullYear(), today.getMonth(), today.getDate())).length > 0 && (
              <div style={{ marginTop: 12 }}>
                <div style={{ fontWeight: 500, marginBottom: 8, fontSize: 13, color: SBC.text }}>STANDBY DUTIES</div>
                {myStandbys.filter(s => new Date(s.year, s.month, s.day) >= new Date(today.getFullYear(), today.getMonth(), today.getDate())).sort((a, b) => new Date(a.year, a.month, a.day) - new Date(b.year, b.month, b.day)).map(sb => (
                  <div key={sb.id} style={{ background: SBC.bg, border: "1px solid " + SBC.border, borderRadius: 10, padding: "10px 14px", marginBottom: 8 }}>
                    <div style={{ fontWeight: 500, fontSize: 13, color: SBC.text }}>Standby - {new Date(sb.year, sb.month, sb.day).toLocaleDateString("en-ZA", { weekday: "short", day: "numeric", month: "short" })}</div>
                    {sb.note && <div style={{ fontSize: 11, color: SBC.text, opacity: 0.75, marginTop: 2 }}>{sb.note}</div>}
                    <div style={{ fontSize: 11, color: SBC.text, opacity: 0.7, marginTop: 4 }}>Stay close to home. You will be notified if needed.</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {recepTab === "week" && (
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
              <button style={btn(false)} onClick={() => setWeekOffset(o => o - 1)}>prev</button>
              <span style={{ fontWeight: 500, flex: 1, textAlign: "center", fontSize: 13 }}>{weekDays[0].toLocaleDateString("en-ZA", { day: "numeric", month: "short" })} - {weekDays[6].toLocaleDateString("en-ZA", { day: "numeric", month: "short", year: "numeric" })}</span>
              <button style={btn(false)} onClick={() => setWeekOffset(o => o + 1)}>next</button>
              {weekOffset !== 0 && <button style={{ ...btn(false), fontSize: 11 }} onClick={() => setWeekOffset(0)}>Today</button>}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4 }}>
              {weekDays.map((d, i) => {
                const isToday = d.toDateString() === today.toDateString();
                const isWE = d.getDay() === 0 || d.getDay() === 6;
                const ds = shifts.filter(s => s.staffId === uid && s.day === d.getDate() && s.month === d.getMonth() && s.year === d.getFullYear());
                const sbs = standbys.filter(s => s.staffId === uid && s.day === d.getDate() && s.month === d.getMonth() && s.year === d.getFullYear());
                return (
                  <div key={i} style={{ borderRadius: 10, border: isToday ? "2px solid " + FVH_BLUE : "0.5px solid #dde3ee", background: isWE ? "#faf7ff" : "#fff", padding: "6px 4px", minHeight: 90 }}>
                    <div style={{ textAlign: "center", marginBottom: 4 }}>
                      <div style={{ fontSize: 9, color: "#888", fontWeight: 500 }}>{DAY_NAMES[d.getDay()]}</div>
                      <div style={{ fontSize: 15, fontWeight: isToday ? 700 : 400, color: isToday ? "#fff" : isWE ? "#7C3AED" : "#1a1a2e", background: isToday ? FVH_BLUE : "transparent", borderRadius: "50%", width: 26, height: 26, display: "flex", alignItems: "center", justifyContent: "center", margin: "2px auto 0" }}>{d.getDate()}</div>
                    </div>
                    {ds.length === 0 && sbs.length === 0 && <div style={{ fontSize: 9, color: "#ccc", textAlign: "center", marginTop: 6 }}>-</div>}
                    {ds.map(sh => <ShiftBadge key={sh.id} sh={sh} small />)}
                    {sbs.map(sb => <StandbyBadge key={sb.id} small />)}
                  </div>
                );
              })}
            </div>
            <div style={{ marginTop: 16 }}>
              {weekDays.map((d, i) => {
                const ds = shifts.filter(s => s.staffId === uid && s.day === d.getDate() && s.month === d.getMonth() && s.year === d.getFullYear());
                const sbs = standbys.filter(s => s.staffId === uid && s.day === d.getDate() && s.month === d.getMonth() && s.year === d.getFullYear());
                if (!ds.length && !sbs.length) return null;
                return (
                  <div key={i} style={{ marginBottom: 10 }}>
                    <div style={{ fontSize: 12, fontWeight: 500, color: "#888", marginBottom: 4 }}>{d.toLocaleDateString("en-ZA", { weekday: "long", day: "numeric", month: "short" })}</div>
                    {ds.map(sh => { const col = getShiftColor(sh.shiftType, sh.year, sh.month, sh.day); const ev = clockEvents.find(c => c.shiftId === sh.id); return <div key={sh.id} style={{ ...card, borderLeft: "4px solid " + col.border, marginBottom: 6 }}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}><div><div style={{ fontSize: 13, fontWeight: 500, color: col.text }}>{col.label} - {sh.shiftLabel} - {sh.shiftTime}</div><div style={{ fontSize: 11, color: "#888" }}>{sh.station}</div></div><div>{ev && ev.approved && <span style={tag("#0f6e56")}>Approved</span>}{ev && ev.clockOut && !ev.approved && <span style={tag("#378add")}>Pending</span>}{ev && ev.clockIn && !ev.clockOut && <button style={{ ...btn(false), fontSize: 11 }} onClick={() => clockOutFn(sh.id)}>Clock Out</button>}{!ev && <button style={{ ...btn(true), fontSize: 11 }} onClick={() => clockIn(sh.id)}>Clock In</button>}</div></div></div>; })}
                    {sbs.map(sb => <div key={sb.id} style={{ background: SBC.bg, border: "1px solid " + SBC.border, borderRadius: 10, padding: "10px 14px", marginBottom: 6 }}><div style={{ fontWeight: 500, fontSize: 13, color: SBC.text }}>Standby</div>{sb.note && <div style={{ fontSize: 11, color: SBC.text, opacity: 0.75 }}>{sb.note}</div>}</div>)}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {recepTab === "month" && (
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
              <button style={btn(false)} onClick={prevMonth}>prev</button>
              <span style={{ fontWeight: 600, flex: 1, textAlign: "center", fontSize: 15 }}>{MONTH_NAMES[viewMonth]} {viewYear}</span>
              <button style={btn(false)} onClick={nextMonth}>next</button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2, marginBottom: 4 }}>
              {DAY_NAMES.map(d => <div key={d} style={{ textAlign: "center", fontSize: 10, color: "#888", fontWeight: 600, padding: "4px 0" }}>{d}</div>)}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 3 }}>
              {cells.map((day, i) => {
                if (!day) return <div key={i} />;
                const isToday = day === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear();
                const isWE = new Date(viewYear, viewMonth, day).getDay() === 0 || new Date(viewYear, viewMonth, day).getDay() === 6;
                const ds = shifts.filter(s => s.staffId === uid && s.day === day && s.month === viewMonth && s.year === viewYear);
                const sbs = standbys.filter(s => s.staffId === uid && s.day === day && s.month === viewMonth && s.year === viewYear);
                return (
                  <div key={i} onClick={() => (ds.length || sbs.length) && setSelectedDay(selectedDay === day ? null : day)} style={{ minHeight: 60, borderRadius: 8, border: isToday ? "2px solid " + FVH_BLUE : "0.5px solid #dde3ee", background: (ds.length || sbs.length) ? "#fff" : isWE ? "#faf7ff" : "#f8f9fc", padding: 4, cursor: (ds.length || sbs.length) ? "pointer" : "default" }}>
                    <div style={{ fontSize: 11, fontWeight: isToday ? 700 : 400, color: isToday ? "#fff" : "#1a1a2e", background: isToday ? FVH_BLUE : "transparent", borderRadius: "50%", width: 20, height: 20, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 2 }}>{day}</div>
                    {ds.map(sh => <ShiftBadge key={sh.id} sh={sh} small />)}
                    {sbs.map(sb => <StandbyBadge key={sb.id} small />)}
                  </div>
                );
              })}
            </div>
            {selectedDay && (() => {
              const ds = shifts.filter(s => s.staffId === uid && s.day === selectedDay && s.month === viewMonth && s.year === viewYear);
              const sbs = standbys.filter(s => s.staffId === uid && s.day === selectedDay && s.month === viewMonth && s.year === viewYear);
              if (!ds.length && !sbs.length) return null;
              return (
                <div style={{ marginTop: 16 }}>
                  <div style={{ fontWeight: 500, marginBottom: 8, color: FVH_BLUE }}>{new Date(viewYear, viewMonth, selectedDay).toLocaleDateString("en-ZA", { weekday: "long", day: "numeric", month: "long" })}</div>
                  {ds.map(sh => { const col = getShiftColor(sh.shiftType, sh.year, sh.month, sh.day); const ev = clockEvents.find(c => c.shiftId === sh.id); return <div key={sh.id} style={{ ...card, borderLeft: "4px solid " + col.border }}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}><div><div style={{ fontWeight: 500, color: col.text }}>{col.label} - {sh.shiftLabel} - {sh.shiftTime}</div><div style={{ fontSize: 12, color: "#888" }}>{sh.station}</div></div><div>{ev && ev.approved && <span style={tag("#0f6e56")}>Approved</span>}{ev && ev.clockOut && !ev.approved && <span style={tag("#378add")}>Pending</span>}{ev && ev.clockIn && !ev.clockOut && <button style={{ ...btn(false), fontSize: 12 }} onClick={() => clockOutFn(sh.id)}>Clock Out</button>}{!ev && <button style={{ ...btn(true), fontSize: 12 }} onClick={() => clockIn(sh.id)}>Clock In</button>}</div></div>{ev && <div style={{ marginTop: 6, fontSize: 11, color: "#888" }}>{ev.clockIn && "In: " + fmtDT(ev.clockIn)}{ev.clockOut && " - Out: " + fmtDT(ev.clockOut) + " - " + calcHours(ev.clockIn, ev.clockOut).toFixed(2) + "h"}</div>}</div>; })}
                  {sbs.map(sb => <div key={sb.id} style={{ background: SBC.bg, border: "1px solid " + SBC.border, borderRadius: 10, padding: "10px 14px" }}><div style={{ fontWeight: 500, color: SBC.text }}>Standby</div>{sb.note && <div style={{ fontSize: 12, color: SBC.text }}>{sb.note}</div>}</div>)}
                </div>
              );
            })()}
            <div style={{ marginTop: 16, background: "#f8f9fc", borderRadius: 12, padding: "14px 16px" }}>
              <div style={{ fontWeight: 500, marginBottom: 10 }}>Month summary</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(70px,1fr))", gap: 8 }}>
                {Object.values(SC).map(col => { const count = shifts.filter(s => s.staffId === uid && s.month === viewMonth && s.year === viewYear && getShiftColor(s.shiftType, s.year, s.month, s.day) === col).length; return <div key={col.label} style={{ background: col.bg, borderRadius: 8, padding: "8px 10px", textAlign: "center" }}><div style={{ fontSize: 18, fontWeight: 600, color: col.text }}>{count}</div><div style={{ fontSize: 9, color: col.text, opacity: 0.8 }}>{col.label}</div></div>; })}
                <div style={{ background: SBC.bg, borderRadius: 8, padding: "8px 10px", textAlign: "center" }}><div style={{ fontSize: 18, fontWeight: 600, color: SBC.text }}>{standbys.filter(s => s.staffId === uid && s.month === viewMonth && s.year === viewYear).length}</div><div style={{ fontSize: 9, color: SBC.text, opacity: 0.8 }}>Standby</div></div>
              </div>
            </div>
          </div>
        )}

        {recepTab === "hours" && (
          <div>
            <div style={{ fontWeight: 500, marginBottom: 12 }}>Hours this month</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
              {[["Shifts allocated", thisMonthShifts.length], ["Hours worked", totalHours.toFixed(2)]].map(([label, val]) => <div key={label} style={{ background: "#f0f3fa", borderRadius: 8, padding: "12px 14px" }}><div style={{ fontSize: 11, color: "#888" }}>{label}</div><div style={{ fontSize: 26, fontWeight: 500, color: FVH_BLUE }}>{val}</div></div>)}

              </table>
            </div>
          </div>
        )}

        {recepTab === "rules" && (
          <div>
            <div style={{ fontWeight: 500, marginBottom: 12 }}>Rules and Protocols</div>
            {rules.map(r => <div key={r.id} style={{ ...card, borderLeft: "4px solid " + FVH_BLUE }}><div style={{ fontWeight: 500, marginBottom: 6, color: FVH_BLUE }}>{r.title}</div><div style={{ fontSize: 13, whiteSpace: "pre-wrap", lineHeight: 1.6 }}>{r.content}</div></div>)}
          </div>
        )}
      </div>
    );
  }

  if (currentUser.role === "admin") {
    const payData = getPayrollData(payMonth, payYear);
    const payMonthName = new Date(payYear, payMonth, 1).toLocaleString("en-ZA", { month: "long", year: "numeric" });
    const todayShifts = getShiftsForDay(today.getDate(), today.getMonth(), today.getFullYear());
    const pendingApprovals = clockEvents.filter(c => c.clockOut && !c.approved).length;
    const sortedShifts = shifts.slice().sort((a, b) => new Date(a.year, a.month, a.day) - new Date(b.year, b.month, b.day));
    const grouped = {};
    sortedShifts.forEach(sh => { const key = sh.year + "-" + sh.month + "-" + sh.day; if (!grouped[key]) grouped[key] = { year: sh.year, month: sh.month, day: sh.day, shifts: [] }; grouped[key].shifts.push(sh); });
    standbys.forEach(sb => { const key = sb.year + "-" + sb.month + "-" + sb.day; if (!grouped[key]) grouped[key] = { year: sb.year, month: sb.month, day: sb.day, shifts: [] }; });
    const daysInMonth = getDaysInMonth(viewYear, viewMonth);
    const firstDay = getFirstDay(viewYear, viewMonth);
    const calCells = []; for (let i = 0; i < firstDay; i++) calCells.push(null); for (let d = 1; d <= daysInMonth; d++) calCells.push(d);

    return (
      <div style={base}>
        <FVHHeader />
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 16 }}>
          {["dashboard","calendar","shifts","payroll","staff","rules"].map(t => <button key={t} style={btn(adminTab === t)} onClick={() => setAdminTab(t)}>{t.charAt(0).toUpperCase() + t.slice(1)}</button>)}
        </div>

        {adminTab === "dashboard" && (
          <div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(130px,1fr))", gap: 10, marginBottom: 16 }}>
              {[["Total Staff", receptionists.length], ["Today Shifts", todayShifts.length], ["Pending Approvals", pendingApprovals], ["Month Shifts", shifts.filter(s => s.month === today.getMonth() && s.year === today.getFullYear()).length]].map(([label, value]) => (
                <div key={label} style={{ background: "#f0f3fa", borderRadius: 8, padding: "12px 14px" }}>
                  <div style={{ fontSize: 26, fontWeight: 500, color: FVH_BLUE }}>{value}</div>
                  <div style={{ fontSize: 11, color: "#888" }}>{label}</div>
                </div>
              ))}
            </div>
            <div style={card}>
              <div style={{ fontWeight: 500, marginBottom: 10 }}>Today - {today.toLocaleDateString("en-ZA", { weekday: "long", day: "numeric", month: "long" })}</div>
              {todayShifts.length === 0 && <div style={{ color: "#888", fontSize: 13 }}>No shifts today</div>}
              {todayShifts.map(sh => { const m = staffState.find(st => st.id === sh.staffId); const ev = clockEvents.find(c => c.shiftId === sh.id); const col = getShiftColor(sh.shiftType, sh.year, sh.month, sh.day); return <div key={sh.id} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "0.5px solid #eee", fontSize: 13 }}><span style={{ fontWeight: 500 }}>{m && m.name}</span><span style={{ color: col.text, fontSize: 12 }}>{col.label} - {sh.shiftTime}</span><span>{ev && ev.approved ? <span style={tag("#0f6e56")}>Approved</span> : ev && ev.clockOut ? <span style={tag("#378add")}>Out</span> : ev && ev.clockIn ? <span style={tag("#ba7517")}>In</span> : <span style={{ color: "#aaa" }}>-</span>}</span></div>; })}
            </div>
          </div>
        )}

        {adminTab === "calendar" && (
          <div>
            <div style={card}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                <button style={btn(false)} onClick={prevMonth}>prev</button>
                <span style={{ fontWeight: 500, flex: 1, textAlign: "center" }}>{MONTH_NAMES[viewMonth]} {viewYear}</span>
                <button style={btn(false)} onClick={nextMonth}>next</button>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2, marginBottom: 4 }}>
                {DAY_NAMES.map(d => <div key={d} style={{ textAlign: "center", fontSize: 11, color: "#888", padding: "4px 0", fontWeight: 500 }}>{d}</div>)}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4 }}>
                {calCells.map((day, i) => {
                  if (!day) return <div key={i} />;
                  const ds = getShiftsForDay(day, viewMonth, viewYear);
                  const sbs = getStandbysForDay(day, viewMonth, viewYear);
                  const isToday = day === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear();
                  return (
                    <div key={i} onClick={() => setSelectedDay(day)} style={{ minHeight: 80, borderRadius: 10, border: isToday ? "2px solid " + FVH_BLUE : "0.5px solid #dde3ee", background: selectedDay === day ? FVH_LIGHT : "#fff", padding: "6px 8px", cursor: "pointer" }}>
                      <div style={{ fontSize: 12, fontWeight: isToday ? 700 : 400, color: isToday ? "#fff" : "#1a1a2e", background: isToday ? FVH_BLUE : "transparent", borderRadius: "50%", width: 24, height: 24, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 4 }}>{day}</div>
                      {ds.slice(0, 2).map(sh => { const m = staffState.find(st => st.id === sh.staffId); const col = getShiftColor(sh.shiftType, sh.year, sh.month, sh.day); return <div key={sh.id} style={{ fontSize: 9, background: col.bg, color: col.text, borderRadius: 3, padding: "2px 4px", marginTop: 2, overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis" }}>{m && m.name}</div>; })}
                      {ds.length > 2 && <div style={{ fontSize: 9, color: "#aaa", marginTop: 2 }}>+{ds.length - 2}</div>}
                      {sbs.map(sb => { const m = staffState.find(st => st.id === sb.staffId); return <div key={sb.id} style={{ fontSize: 9, background: SBC.bg, color: SBC.text, borderRadius: 3, padding: "2px 4px", marginTop: 2, overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis" }}>SB: {m && m.name}</div>; })}
                    </div>
                  );
                })}
              </div>
            </div>
            <div style={card}>
              {!selectedDay && <div style={{ color: "#888", fontSize: 13, textAlign: "center", padding: "12px 0" }}>Select a day to view shifts</div>}
              {selectedDay && (() => {
                const ds = getShiftsForDay(selectedDay, viewMonth, viewYear);
                const sbs = getStandbysForDay(selectedDay, viewMonth, viewYear);
                const dateLabel = new Date(viewYear, viewMonth, selectedDay).toLocaleDateString("en-ZA", { weekday: "long", day: "numeric", month: "long" });
                return (
                  <div>
                    <div style={{ fontWeight: 500, marginBottom: 10, color: FVH_BLUE }}>{dateLabel}</div>
                    {ds.length === 0 && sbs.length === 0 && <div style={{ fontSize: 13, color: "#888" }}>No shifts allocated</div>}
                    {ds.map(sh => { const member = staffState.find(st => st.id === sh.staffId); const ev = clockEvents.find(c => c.shiftId === sh.id); const col = getShiftColor(sh.shiftType, sh.year, sh.month, sh.day); return <div key={sh.id} style={{ ...card, borderLeft: "4px solid " + col.border, marginBottom: 8 }}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}><div><div style={{ fontWeight: 500 }}>{member && member.name}</div><div style={{ fontSize: 12, color: col.text }}>{col.label} - {sh.shiftLabel} - {sh.shiftTime}</div><div style={{ fontSize: 11, color: "#888" }}>{sh.station}{sh.note ? " - " + sh.note : ""}{sh.recurring ? " (recurring)" : ""}</div></div><div style={{ display: "flex", gap: 5 }}>{ev && ev.approved && <span style={tag("#0f6e56")}>Approved</span>}{ev && ev.clockOut && !ev.approved && <span style={tag("#378add")}>Out</span>}{ev && ev.clockIn && !ev.clockOut && <span style={tag("#ba7517")}>In</span>}<button style={{ ...btn(false), fontSize: 11, padding: "3px 7px" }} onClick={() => { setReallocModal(sh); setReallocStaff(""); }}>Reallocate</button><button style={{ ...btn(false), fontSize: 11, padding: "3px 7px", color: "#c0392b" }} onClick={() => deleteShift(sh.id)}>Remove</button></div></div></div>; })}
                    {sbs.map(sb => { const member = staffState.find(st => st.id === sb.staffId); return <div key={sb.id} style={{ background: SBC.bg, border: "1px solid " + SBC.border, borderRadius: 10, padding: "10px 12px", marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center" }}><div><div style={{ fontWeight: 500, color: SBC.text }}>Standby - {member && member.name}</div>{sb.note && <div style={{ fontSize: 11, color: SBC.text }}>{sb.note}</div>}</div><button style={{ ...btn(false), fontSize: 11, color: "#c0392b" }} onClick={() => deleteStandby(sb.id)}>Remove</button></div>; })}
                    <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                      <button style={{ ...btn(true), background: FVH_BLUE, color: "#fff", border: "none" }} onClick={() => setShiftModal({ day: selectedDay, month: viewMonth, year: viewYear })}>+ Add Shift</button>
                      <button style={{ background: SBC.bg, color: SBC.text, border: "1px solid " + SBC.border, borderRadius: 8, padding: "7px 14px", cursor: "pointer", fontSize: 13 }} onClick={() => setStandbyModal({ day: selectedDay, month: viewMonth, year: viewYear })}>+ Add Standby</button>
                    </div>
                  </div>
                );
              })()}
            </div>
          </div>
        )}

        {adminTab === "shifts" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {[["roster","Daily Roster"],["reallocate","Reallocate"],["upload","AI Reader"]].map(([id, label]) => <button key={id} style={{ ...btn(shiftSubTab === id), fontSize: 12 }} onClick={() => setShiftSubTab(id)}>{label}</button>)}
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <button style={{ ...btn(true), background: FVH_BLUE, color: "#fff", border: "none" }} onClick={() => setShiftModal({ day: today.getDate(), month: today.getMonth(), year: today.getFullYear() })}>+ Shift</button>
                <button style={{ background: SBC.bg, color: SBC.text, border: "1px solid " + SBC.border, borderRadius: 8, padding: "7px 12px", cursor: "pointer", fontSize: 13 }} onClick={() => setStandbyModal({ day: today.getDate(), month: today.getMonth(), year: today.getFullYear() })}>+ Standby</button>
              </div>
            </div>

            {shiftSubTab === "upload" && (
              <div>
                <div style={{ ...card, borderLeft: "4px solid " + FVH_BLUE }}>
                  <div style={{ fontWeight: 500, marginBottom: 6 }}>AI Shift Reader</div>
                  <div style={{ fontSize: 12, color: "#888", marginBottom: 16, lineHeight: 1.7 }}>Upload a <strong>photo</strong>, <strong>Word doc (.docx)</strong> or <strong>PDF</strong> of the shift schedule. The AI will read it and load all shifts for your review.</div>
                  <label style={{ display: "inline-flex", alignItems: "center", gap: 8, background: FVH_BLUE, color: "#fff", borderRadius: 8, padding: "9px 18px", fontSize: 13, fontWeight: 500, cursor: "pointer" }}>
                    {uploading ? "Reading..." : "Upload photo or file"}
                    <input type="file" accept=".pdf,.docx,image/*" style={{ display: "none" }} onChange={handleUpload} disabled={uploading} />
                  </label>
                  {uploading && <div style={{ marginTop: 12, fontSize: 13, color: "#888" }}>Reading shift schedule, please wait...</div>}
                </div>
                {uploadResult && uploadResult.error && <div style={{ ...card, borderLeft: "4px solid #c0392b", color: "#c0392b", fontSize: 13 }}>{uploadResult.error}</div>}
                {uploadResult && !uploadResult.error && (
                  <div>
                    <div style={{ fontWeight: 500, marginBottom: 10, fontSize: 13 }}>{uploadResult.filter(s => s.staffId).length} matched - {uploadResult.filter(s => !s.staffId).length} unmatched</div>
                    <div style={{ ...card, background: "#f8f9fc", marginBottom: 12 }}>
                      <div style={{ maxHeight: 300, overflowY: "auto" }}>
                        {uploadResult.map((s, i) => { const col = s.staffId ? getShiftColor(s.shiftType, s.year, s.month, s.day) : null; return <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 4px", borderBottom: "0.5px solid #eee", fontSize: 12, gap: 8 }}><div style={{ display: "flex", gap: 8, alignItems: "center" }}><div style={{ width: 8, height: 8, borderRadius: "50%", background: s.staffId ? "#10B981" : "#c0392b", flexShrink: 0 }} /><span style={{ fontWeight: 500, color: s.staffId ? "#1a1a2e" : "#c0392b" }}>{s.staffName}</span></div><span style={{ color: "#888", fontSize: 11 }}>{new Date(s.year, s.month, s.day).toLocaleDateString("en-ZA", { day: "numeric", month: "short" })}</span><span style={{ color: col ? col.text : "#c0392b", background: col ? col.bg : "#fde8e8", borderRadius: 4, padding: "2px 7px", fontSize: 11 }}>{s.shiftLabel}</span><span style={{ color: "#888", fontSize: 11 }}>{s.shiftTime}</span></div>; })}
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <button style={{ ...btn(true), background: FVH_BLUE, color: "#fff", border: "none", padding: "9px 20px" }} onClick={() => confirmUploadShifts(uploadResult)}>Load {uploadResult.filter(s => s.staffId).length} Shifts</button>
                      <button style={{ ...btn(false), padding: "9px 20px" }} onClick={() => setUploadResult(null)}>Cancel</button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {(shiftSubTab === "roster" || shiftSubTab === "reallocate") && (
              <div>
                {Object.keys(grouped).length === 0 && <div style={{ color: "#888", fontSize: 13 }}>No shifts yet.</div>}
                {Object.values(grouped).sort((a,b) => new Date(a.year,a.month,a.day)-new Date(b.year,b.month,b.day)).map(group => {
                  const key = group.year + "-" + group.month + "-" + group.day;
                  const dateLabel = new Date(group.year, group.month, group.day).toLocaleDateString("en-ZA", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
                  const isToday = group.day === today.getDate() && group.month === today.getMonth() && group.year === today.getFullYear();
                  const daySBs = getStandbysForDay(group.day, group.month, group.year);
                  return (
                    <div key={key} style={{ marginBottom: 20 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                        <div style={{ fontWeight: 600, fontSize: 13, color: isToday ? FVH_BLUE : "#1a1a2e" }}>{dateLabel}</div>
                        {isToday && <span style={{ ...tag(FVH_BLUE), fontSize: 10 }}>Today</span>}
                        <div style={{ flex: 1, height: "0.5px", background: "#dde3ee" }} />
                        <span style={{ fontSize: 11, color: "#888" }}>{group.shifts.length} shift{group.shifts.length !== 1 ? "s" : ""}{daySBs.length > 0 ? " + " + daySBs.length + " SB" : ""}</span>
                      </div>
                      {shiftSubTab === "roster" && (
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(175px,1fr))", gap: 8 }}>
                          {group.shifts.map(sh => { const m = staffState.find(st => st.id === sh.staffId); const col = getShiftColor(sh.shiftType, sh.year, sh.month, sh.day); const ev = clockEvents.find(c => c.shiftId === sh.id); return <div key={sh.id} style={{ background: col.bg, borderRadius: 10, padding: "10px 12px", borderLeft: "4px solid " + col.border }}><div style={{ fontWeight: 600, fontSize: 13, color: col.text }}>{m && m.name}</div><div style={{ fontSize: 11, color: col.text, opacity: 0.85, marginTop: 2 }}>{col.label} - {sh.shiftLabel}</div><div style={{ fontSize: 11, color: col.text, opacity: 0.75 }}>{sh.shiftTime}</div><div style={{ fontSize: 10, color: col.text, opacity: 0.65, marginTop: 2 }}>{sh.station}{sh.recurring ? " *" : ""}</div>{ev && <div style={{ marginTop: 4 }}>{ev.approved && <span style={{ fontSize: 10, background: "rgba(16,185,129,0.2)", color: "#065F46", borderRadius: 4, padding: "2px 6px" }}>Approved</span>}{ev.clockOut && !ev.approved && <span style={{ fontSize: 10, background: "rgba(55,138,221,0.2)", color: "#185FA5", borderRadius: 4, padding: "2px 6px" }}>Out</span>}{ev.clockIn && !ev.clockOut && <span style={{ fontSize: 10, background: "rgba(186,117,23,0.2)", color: "#92400E", borderRadius: 4, padding: "2px 6px" }}>In</span>}</div>}</div>; })}
                          {daySBs.map(sb => { const m = staffState.find(st => st.id === sb.staffId); return <div key={sb.id} style={{ background: SBC.bg, borderRadius: 10, padding: "10px 12px", borderLeft: "4px solid " + SBC.border }}><div style={{ fontWeight: 600, fontSize: 13, color: SBC.text }}>{m && m.name}</div><div style={{ fontSize: 11, color: SBC.text, opacity: 0.85, marginTop: 2 }}>Standby</div></div>; })}
                        </div>
                      )}
                      {shiftSubTab === "reallocate" && (
                        <div>
                          {group.shifts.map(sh => { const m = staffState.find(st => st.id === sh.staffId); const col = getShiftColor(sh.shiftType, sh.year, sh.month, sh.day); return <div key={sh.id} style={{ ...card, display: "flex", justifyContent: "space-between", alignItems: "center", borderLeft: "4px solid " + col.border, marginBottom: 6 }}><div><div style={{ fontWeight: 500 }}>{m && m.name}</div><div style={{ fontSize: 12, color: col.text }}>{col.label} - {sh.shiftLabel} - {sh.shiftTime}</div><div style={{ fontSize: 11, color: "#888" }}>{sh.station}{sh.recurring ? " (recurring)" : ""}</div></div><div style={{ display: "flex", gap: 6 }}><button style={{ ...btn(true), fontSize: 11, padding: "5px 10px", background: FVH_BLUE, color: "#fff", border: "none" }} onClick={() => { setReallocModal(sh); setReallocStaff(""); }}>Reallocate</button><button style={{ ...btn(false), fontSize: 11, padding: "5px 10px", color: "#c0392b" }} onClick={() => deleteShift(sh.id)}>Remove</button></div></div>; })}
                          {daySBs.map(sb => { const m = staffState.find(st => st.id === sb.staffId); return <div key={sb.id} style={{ background: SBC.bg, border: "1px solid " + SBC.border, borderRadius: 10, padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}><div><div style={{ fontWeight: 500, color: SBC.text }}>Standby - {m && m.name}</div></div><button style={{ ...btn(false), fontSize: 11, color: "#c0392b" }} onClick={() => deleteStandby(sb.id)}>Remove</button></div>; })}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {adminTab === "payroll" && (
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
              <button style={btn(false)} onClick={() => { if (payMonth === 0) { setPayMonth(11); setPayYear(y => y - 1); } else setPayMonth(m => m - 1); }}>prev</button>
              <span style={{ fontWeight: 500 }}>{payMonthName}</span>
              <button style={btn(false)} onClick={() => { if (payMonth === 11) { setPayMonth(0); setPayYear(y => y + 1); } else setPayMonth(m => m + 1); }}>next</button>
            </div>
            <div style={card}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead><tr style={{ borderBottom: "0.5px solid #dde3ee" }}>{["Name","Shifts","Hours","Rate (R/hr)","Total Pay"].map(h => <th key={h} style={{ textAlign: "left", padding: "6px 8px", fontSize: 11, color: "#888", fontWeight: 500 }}>{h}</th>)}</tr></thead>
                <tbody>{payData.map(r => <tr key={r.id} style={{ borderBottom: "0.5px solid #eee" }}><td style={{ padding: "8px", fontWeight: 500 }}>{r.name}</td><td style={{ padding: "8px" }}>{r.shiftsCount}</td><td style={{ padding: "8px" }}>{r.totalHours.toFixed(2)}</td><td style={{ padding: "8px" }}>R {r.hourlyRate.toFixed(2)}</td><td style={{ padding: "8px", fontWeight: 500, color: FVH_BLUE }}>R {r.totalPay.toFixed(2)}</td></tr>)}</tbody>
                <tfoot><tr style={{ borderTop: "1.5px solid " + FVH_BLUE }}><td colSpan={2} style={{ padding: "8px", fontWeight: 500 }}>Total</td><td style={{ padding: "8px", fontWeight: 500 }}>{payData.reduce((a, r) => a + r.totalHours, 0).toFixed(2)}</td><td></td><td style={{ padding: "8px", fontWeight: 500, color: FVH_BLUE }}>R {payData.reduce((a, r) => a + r.totalPay, 0).toFixed(2)}</td></tr></tfoot>
              </table>
            </div>
            <div style={{ fontSize: 11, color: "#888", marginTop: 4 }}>Hours from approved records only.</div>
            <button style={{ ...btn(true), background: FVH_BLUE, color: "#fff", border: "none", marginTop: 14, padding: "10px 20px" }} onClick={() => {
              const rows = [["Name","Shifts","Hours","Rate","Total Pay"], ...payData.map(r => [r.name, r.shiftsCount, r.totalHours.toFixed(2), r.hourlyRate.toFixed(2), r.totalPay.toFixed(2)]), ["TOTAL","",payData.reduce((a,r)=>a+r.totalHours,0).toFixed(2),"",payData.reduce((a,r)=>a+r.totalPay,0).toFixed(2)]];
              const csv = rows.map(r => r.map(v => '"' + v + '"').join(",")).join("\n");
              const blob = new Blob([csv], { type: "text/csv" });
              const url = URL.createObjectURL(blob);
              const a = document.createElement("a"); a.href = url; a.download = "FVH_Payroll_" + payMonthName.replace(" ","_") + ".csv"; a.click(); URL.revokeObjectURL(url);
            }}>Download CSV</button>
          </div>
        )}

        {adminTab === "staff" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div style={{ fontWeight: 500 }}>Staff profiles</div>
              <button style={{ ...btn(true), background: FVH_BLUE, color: "#fff", border: "none" }} onClick={() => setAddStaffOpen(true)}>+ Add Staff</button>
            </div>
            {staffState.map(m => (
              <div key={m.id} style={{ ...card, padding: "12px 16px" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 36, height: 36, borderRadius: "50%", background: FVH_BLUE + "22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 500, color: FVH_BLUE }}>{m.name[0]}</div>
                    <div>
                      <div style={{ fontWeight: 500, fontSize: 14 }}>{m.name}</div>
                      <span style={{ ...tag(ROLE_COLORS[m.role] || "#888"), fontSize: 10 }}>{m.role}</span>
                    </div>
                  </div>
                  {m.role === "receptionist" && (
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      {editRateId === m.id ? (
                        <>
                          <span style={{ fontSize: 13, color: "#888" }}>R</span>
                          <input type="number" autoFocus style={{ ...inpLight, width: 80, padding: "5px 8px" }} value={editRateVal} onChange={e => setEditRateVal(e.target.value)} onKeyDown={e => e.key === "Enter" && saveRate(m.id)} />
                          <span style={{ fontSize: 13, color: "#888" }}>/hr</span>
                          <button style={{ ...btn(true), padding: "5px 12px", fontSize: 12 }} onClick={() => saveRate(m.id)}>Save</button>
                          <button style={{ ...btn(false), padding: "5px 12px", fontSize: 12 }} onClick={() => setEditRateId(null)}>Cancel</button>
                        </>
                      ) : (
                        <>
                          <span style={{ fontSize: 14, fontWeight: 500, color: FVH_BLUE }}>R {m.hourlyRate}/hr</span>
                          <button style={{ ...btn(false), padding: "5px 12px", fontSize: 12 }} onClick={() => { setEditRateId(m.id); setEditRateVal(m.hourlyRate); }}>Edit rate</button>
                        </>
                      )}
                      <button style={{ ...btn(false), padding: "5px 10px", fontSize: 12, color: "#c0392b" }} onClick={() => { if (window.confirm("Remove " + m.name + "?")) deleteStaffMember(m.id); }}>Delete</button>
                    </div>
                  )}
                </div>
              </div>
            ))}
          </div>
        )}

        {adminTab === "rules" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div style={{ fontWeight: 500 }}>Rules and Protocols</div>
              <button style={{ ...btn(true), background: FVH_BLUE, color: "#fff", border: "none" }} onClick={() => { setRuleModal("new"); setEditRule({ title: "", content: "" }); }}>+ Add Rule</button>
            </div>
            {rules.map(r => (
              <div key={r.id} style={{ ...card, borderLeft: "4px solid " + FVH_BLUE }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                  <div style={{ fontWeight: 500 }}>{r.title}</div>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button style={{ ...btn(false), fontSize: 11, padding: "4px 8px" }} onClick={() => { setRuleModal(r.id); setEditRule({ title: r.title, content: r.content }); }}>Edit</button>
                    <button style={{ ...btn(false), fontSize: 11, padding: "4px 8px", color: "#c0392b" }} onClick={() => deleteRuleFn(r.id)}>Delete</button>
                  </div>
                </div>
                <div style={{ fontSize: 12, color: "#666", whiteSpace: "pre-wrap", lineHeight: 1.6 }}>{r.content}</div>
              </div>
            ))}
          </div>
        )}

        {shiftModal && <Modal onClose={() => setShiftModal(null)}><div style={{ fontWeight: 600, marginBottom: 16, fontSize: 15, color: "#fff" }}>Add shift - {new Date(shiftModal.year, shiftModal.month, shiftModal.day).toLocaleDateString("en-ZA", { day: "numeric", month: "long" })}</div>{[["Staff member","staffId","staff"],["Shift type","shiftType","shift"],["Station","station","station"],["Note (optional)","note","text"]].map(([label, key, type]) => (<div key={key} style={{ marginBottom: 12 }}><label style={inpLabel}>{label}</label>{type === "staff" && <select style={inp} value={newShift.staffId} onChange={e => setNewShift(p => ({ ...p, staffId: e.target.value }))}><option value="">Select...</option>{receptionists.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}</select>}{type === "shift" && <select style={inp} value={newShift.shiftType} onChange={e => setNewShift(p => ({ ...p, shiftType: e.target.value }))}>{SHIFT_TYPES.map(t => <option key={t.id} value={t.id}>{t.label} ({t.time})</option>)}</select>}{type === "station" && <select style={inp} value={newShift.station} onChange={e => setNewShift(p => ({ ...p, station: e.target.value }))}>{STATIONS.map(s => <option key={s}>{s}</option>)}</select>}{type === "text" && <input style={inp} placeholder="e.g. Staff Meeting" value={newShift.note} onChange={e => setNewShift(p => ({ ...p, note: e.target.value }))} />}</div>))}<div style={{ display: "flex", gap: 8 }}><button style={modalBtn(true)} onClick={addShift}>Add Shift</button><button style={modalBtn(false)} onClick={() => setShiftModal(null)}>Cancel</button></div></Modal>}
        {standbyModal && <Modal onClose={() => setStandbyModal(null)}><div style={{ fontWeight: 600, marginBottom: 16, fontSize: 15, color: "#fff" }}>Add Standby - {new Date(standbyModal.year, standbyModal.month, standbyModal.day).toLocaleDateString("en-ZA", { day: "numeric", month: "long" })}</div><div style={{ marginBottom: 12 }}><label style={inpLabel}>Staff member</label><select style={inp} value={newStandby.staffId} onChange={e => setNewStandby(p => ({ ...p, staffId: e.target.value }))}><option value="">Select...</option>{receptionists.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}</select></div><div style={{ marginBottom: 14 }}><label style={inpLabel}>Note (optional)</label><input style={inp} placeholder="e.g. Cover for morning shift" value={newStandby.note} onChange={e => setNewStandby(p => ({ ...p, note: e.target.value }))} /></div><div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 8, padding: "10px 12px", marginBottom: 14, fontSize: 12, color: "rgba(255,255,255,0.8)", lineHeight: 1.6 }}>Standby staff must stay close to home, be ready to arrive ASAP, and will be paid if called in.</div><div style={{ display: "flex", gap: 8 }}><button style={modalBtn(true)} onClick={addStandby}>Confirm</button><button style={modalBtn(false)} onClick={() => setStandbyModal(null)}>Cancel</button></div></Modal>}
        {reallocModal && <Modal onClose={() => setReallocModal(null)}><div style={{ fontWeight: 600, marginBottom: 6, fontSize: 15, color: "#fff" }}>Reallocate shift</div><div style={{ fontSize: 12, color: "rgba(255,255,255,0.75)", marginBottom: 16 }}>{new Date(reallocModal.year, reallocModal.month, reallocModal.day).toLocaleDateString("en-ZA", { day: "numeric", month: "long" })} - {reallocModal.shiftLabel}</div><div style={{ marginBottom: 16 }}><label style={inpLabel}>Reassign to</label><select style={inp} value={reallocStaff} onChange={e => setReallocStaff(e.target.value)}><option value="">Select...</option>{receptionists.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}</select></div><div style={{ display: "flex", gap: 8 }}><button style={modalBtn(true)} onClick={reallocShift}>Confirm</button><button style={modalBtn(false)} onClick={() => setReallocModal(null)}>Cancel</button></div></Modal>}
        {ruleModal && <Modal onClose={() => setRuleModal(null)}><div style={{ fontWeight: 600, marginBottom: 16, fontSize: 15, color: "#fff" }}>{ruleModal === "new" ? "Add rule" : "Edit rule"}</div><div style={{ marginBottom: 12 }}><label style={inpLabel}>Title</label><input style={inp} value={editRule.title} onChange={e => setEditRule(p => ({ ...p, title: e.target.value }))} /></div><div style={{ marginBottom: 16 }}><label style={inpLabel}>Content</label><textarea style={{ ...inp, height: 120, resize: "vertical" }} value={editRule.content} onChange={e => setEditRule(p => ({ ...p, content: e.target.value }))} /></div><div style={{ display: "flex", gap: 8 }}><button style={modalBtn(true)} onClick={saveRuleFn}>Save</button><button style={modalBtn(false)} onClick={() => setRuleModal(null)}>Cancel</button></div></Modal>}
        {addStaffOpen && <Modal onClose={() => setAddStaffOpen(false)}><div style={{ fontWeight: 600, marginBottom: 16, fontSize: 15, color: "#fff" }}>Add new staff member</div>{[["Name","name","text"],["PIN","pin","password"]].map(([label, key, type]) => (<div key={key} style={{ marginBottom: 12 }}><label style={inpLabel}>{label}</label><input type={type} style={inp} value={newStaff[key]} onChange={e => setNewStaff(p => ({ ...p, [key]: e.target.value }))} /></div>))}<div style={{ marginBottom: 12 }}><label style={inpLabel}>Role</label><select style={inp} value={newStaff.role} onChange={e => setNewStaff(p => ({ ...p, role: e.target.value }))}><option value="receptionist">Receptionist</option><option value="vet">Vet</option><option value="nurse">Nurse</option></select></div>{newStaff.role === "receptionist" && <div style={{ marginBottom: 12 }}><label style={inpLabel}>Hourly Rate (R)</label><input type="number" style={inp} value={newStaff.hourlyRate} onChange={e => setNewStaff(p => ({ ...p, hourlyRate: e.target.value }))} /></div>}<div style={{ display: "flex", gap: 8 }}><button style={modalBtn(true)} onClick={addStaffMember}>Add</button><button style={modalBtn(false)} onClick={() => setAddStaffOpen(false)}>Cancel</button></div></Modal>}
      </div>
    );
  }

  if (currentUser.role === "vet" || currentUser.role === "nurse") {
    const nameList = currentUser.role === "vet" ? VETS : NURSES;
    const todayStr = today.toDateString();
    const todayShifts = getShiftsForDay(today.getDate(), today.getMonth(), today.getFullYear());
    const pendingEvents = clockEvents.filter(c => { if (c.approved || !c.clockOut) return false; const sh = shifts.find(s => s.id === c.shiftId); return sh && new Date(sh.year, sh.month, sh.day).toDateString() === todayStr; });

    if (!selectedClinician) {
      return (
        <div style={base}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 0 16px", borderBottom: "0.5px solid #dde3ee", marginBottom: 16 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ background: FVH_BLUE, borderRadius: 8, width: 38, height: 38, display: "flex", alignItems: "center", justifyContent: "center" }}><span style={{ color: "#fff", fontWeight: 700, fontSize: 13 }}>FVH</span></div>
              <div><div style={{ fontWeight: 500, fontSize: 14 }}>Fourways Vet Hospital</div><div style={{ fontSize: 11, color: "#888" }}>{currentUser.role === "vet" ? "Veterinarian" : "Nurse"} login</div></div>
            </div>
            <button style={btn(false)} onClick={logout}>Sign out</button>
          </div>
          <div style={{ ...card, textAlign: "center", padding: "20px", marginBottom: 16 }}>
            <div style={{ fontWeight: 600, fontSize: 16, marginBottom: 4 }}>Who are you?</div>
            <div style={{ fontSize: 13, color: "#888" }}>Select your name to continue</div>
          </div>
          {nameList.length === 0 && <div style={{ ...card, color: "#888", fontSize: 13, textAlign: "center" }}>No names loaded yet. Please contact admin.</div>}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(175px,1fr))", gap: 8 }}>
            {nameList.map(name => (
              <button key={name} onClick={() => setSelectedClinician(name)} style={{ background: "#fff", border: "0.5px solid #c8d0e0", borderRadius: 10, padding: "14px 16px", cursor: "pointer", textAlign: "left" }}>
                <div style={{ width: 32, height: 32, borderRadius: "50%", background: FVH_BLUE + "22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, color: FVH_BLUE, marginBottom: 8 }}>{name[0]}</div>
                <div style={{ fontWeight: 500, fontSize: 13 }}>{name}</div>
                <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>{currentUser.role === "vet" ? "Veterinarian" : "Nurse"}</div>
              </button>
            ))}
          </div>
        </div>
      );
    }

    return (
      <div style={base}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 0 16px", borderBottom: "0.5px solid #dde3ee", marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ background: FVH_BLUE, borderRadius: 8, width: 38, height: 38, display: "flex", alignItems: "center", justifyContent: "center" }}><span style={{ color: "#fff", fontWeight: 700, fontSize: 13 }}>FVH</span></div>
            <div><div style={{ fontWeight: 500, fontSize: 14 }}>{selectedClinician}</div><div style={{ fontSize: 11, color: "#888" }}><span style={{ ...tag(ROLE_COLORS[currentUser.role] || "#888"), fontSize: 10 }}>{currentUser.role}</span></div></div>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button style={{ ...btn(false), fontSize: 12 }} onClick={() => setSelectedClinician(null)}>Change name</button>
            <button style={btn(false)} onClick={() => { setSelectedClinician(null); logout(); }}>Sign out</button>
          </div>
        </div>
        <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
          {["approvals","roster"].map(t => <button key={t} style={btn(vetTab === t)} onClick={() => setVetTab(t)}>{t === "approvals" ? "Approvals" + (pendingEvents.length > 0 ? " (" + pendingEvents.length + ")" : "") : "Today's Roster"}</button>)}
        </div>
        {vetTab === "approvals" && (
          <div>
            <div style={{ fontWeight: 500, marginBottom: 12 }}>Pending approvals</div>
            {pendingEvents.length === 0 && <div style={{ color: "#888", fontSize: 13 }}>No pending approvals</div>}
            {pendingEvents.map(ev => { const sh = shifts.find(s => s.id === ev.shiftId); const member = sh ? staffState.find(st => st.id === sh.staffId) : null; const col = sh ? getShiftColor(sh.shiftType, sh.year, sh.month, sh.day) : SC.morning; return <div key={ev.id} style={{ ...card, borderLeft: "4px solid " + col.border }}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}><div><div style={{ fontWeight: 500 }}>{member && member.name}</div><div style={{ fontSize: 12, color: col.text }}>{sh && sh.shiftLabel} - {sh && sh.shiftTime}</div><div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>In: {fmtDT(ev.clockIn)} - Out: {fmtDT(ev.clockOut)} - {calcHours(ev.clockIn, ev.clockOut).toFixed(2)}h</div><div style={{ fontSize: 11, color: "#888", fontStyle: "italic" }}>Approving as: {selectedClinician}</div></div><button style={{ ...btn(true), background: "#0f6e56", border: "none", padding: "8px 16px" }} onClick={() => approve(ev.id, selectedClinician)}>Approve</button></div></div>; })}
          </div>
        )}
        {vetTab === "roster" && (
          <div>
            <div style={{ fontWeight: 500, marginBottom: 12 }}>Today - {today.toLocaleDateString("en-ZA", { weekday: "long", day: "numeric", month: "long" })}</div>
            {todayShifts.length === 0 && <div style={{ color: "#888", fontSize: 13 }}>No shifts today</div>}
            {todayShifts.map(sh => { const m = staffState.find(st => st.id === sh.staffId); const ev = clockEvents.find(c => c.shiftId === sh.id); const col = getShiftColor(sh.shiftType, sh.year, sh.month, sh.day); return <div key={sh.id} style={{ ...card, display: "flex", justifyContent: "space-between", alignItems: "center", borderLeft: "4px solid " + col.border }}><div><div style={{ fontWeight: 500 }}>{m && m.name}</div><div style={{ fontSize: 12, color: col.text }}>{sh.shiftTime} - {sh.station}</div></div><div>{ev && ev.approved ? <span style={tag("#0f6e56")}>Approved</span> : ev && ev.clockOut ? <span style={tag("#378add")}>Clocked out</span> : ev && ev.clockIn ? <span style={tag("#ba7517")}>Clocked in</span> : <span style={{ color: "#888", fontSize: 12 }}>Not clocked in</span>}</div></div>; })}
          </div>
        )}
      </div>
    );
  }

  return null;
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
