function shiftColor(type, y, m, d) {
  const dow = new Date(y,m,d).getDay();
  if (dow===0||dow===6) return SC.weekend;
  const t = SHIFTS.find(s=>s.id===type);
  return SC[t?t.cat:"morning"]||SC.morning;
}

const RULES0 = [
  {id:"r1",title:"Standby Protocol",content:"If you are on Standby, please ensure that you are close to home and have everything prepared so that you can arrive ASAP.\n\nIf the standby is needed, you will be notified.\n\nIf you are called in to work, you will be paid for your shift.\n\nThe Standby is there to provide cover in the event of an emergency and for no other reason."},

const MR = [["M - Middle","R - Retail","H - Hospital"],["M - Middle","R - Retail","H - Hospital"],["R - Retail","H - Hospital","M - Middle"],["H - Hospital","M - Middle","R - Retail"]];
const AR = [["H - Hospital","M - Middle","H - Hospital"],["H - Hospital","M - Middle","H - Hospital"],["H - Hospital","R - Retail","M - Middle"],["M - Middle","H - Hospital","R - Retail"]];
const MS = [{name:"Natasha",type:"morning_early",label:"Morning Early",time:"06:00-12:00"},{name:"Sandy",type:"morning_extra",label:"Morning Extra",time:"07:00-11:00"},{name:"Nicole",type:"afternoon_main",label:"Afternoon Main",time:"08:00-16:30"}];
const AS = [{name:"Paige M",type:"afternoon_main",label:"Afternoon 11:00",time:"11:00-19:30"},{name:"Karrighan",type:"afternoon_main",label:"Afternoon 11:30",time:"11:30-20:00"},{name:"Edith",type:"afternoon_main",label:"Afternoon 12:00",time:"12:00-20:30"}];

function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function firstDay(y,m){return new Date(y,m,1).getDay();}
function genId(){return Math.random().toString(36).substr(2,9);}
function calcH(i,o){if(!i||!o)return 0;return Math.round((new Date(o)-new Date(i))/3600000*100)/100;}
function fmt(iso){if(!iso)return"-";return new Date(iso).toLocaleString("en-ZA",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});}

function genRecurring(month, year, staffList) {
  const result = [];
  const days = daysInMonth(year, month);
  let wk = 0;
  for (let day = 1; day <= days; day++) {
    const dow = new Date(year, month, day).getDay();
    if (dow === 1) wk++;
    if (dow === 0 || dow === 6) continue;
    const wi = Math.min(wk, 4) - 1;
    const mr = MR[Math.max(wi,0)] || MR[0];
    const ar = AR[Math.max(wi,0)] || AR[0];
    MS.forEach(function(sd, i) {
      const m = staffList.find(function(s){return s.name===sd.name;});
      if (!m) return;
      result.push({id:genId(),staffId:m.id,day,month,year,shiftType:sd.type,shiftLabel:sd.label,shiftTime:sd.time,station:mr[i]||"H - Hospital",note:"",recurring:true});
    });
    AS.forEach(function(sd, i) {
      const m = staffList.find(function(s){return s.name===sd.name;});
      if (!m) return;
      result.push({id:genId(),staffId:m.id,day,month,year,shiftType:sd.type,shiftLabel:sd.label,shiftTime:sd.time,station:ar[i]||"M - Middle",note:"",recurring:true});
    });
  }
  return result;
}

const today = new Date();

function App() {
  const [user, setUser] = useState(null);
  const [loginName, setLoginName] = useState("");
  const [loginPin, setLoginPin] = useState("");
  const [loginErr, setLoginErr] = useState("");
  const [staff, setStaff] = useState(STAFF0);
  const [shifts, setShifts] = useState([]);
  const [standbys, setStandbys] = useState([]);
  const [clocks, setClocks] = useState([]);
  const [rules, setRules] = useState(RULES0);
  const [ready, setReady] = useState(false);
  const [genMonths, setGenMonths] = useState([]);
  const [adminTab, setAdminTab] = useState("dashboard");
  const [recTab, setRecTab] = useState("overview");
  const [vetTab, setVetTab] = useState("approvals");
  const [clinician, setClinician] = useState(null);
  const [vm, setVm] = useState(today.getMonth());
  const [vy, setVy] = useState(today.getFullYear());
  const [selDay, setSelDay] = useState(null);
  const [wkOff, setWkOff] = useState(0);
  const [shiftMod, setShiftMod] = useState(null);
  const [sbMod, setSbMod] = useState(null);
  const [reallocMod, setReallocMod] = useState(null);
  const [ruleMod, setRuleMod] = useState(null);
  const [addStaffOpen, setAddStaffOpen] = useState(false);
  const [payM, setPayM] = useState(today.getMonth());
  const [payY, setPayY] = useState(today.getFullYear());
  const [subTab, setSubTab] = useState("roster");
  const [editRateId, setEditRateId] = useState(null);
  const [editRateVal, setEditRateVal] = useState("");
  const [newShift, setNewShift] = useState({staffId:"",shiftType:"morning_early",station:"H - Hospital",note:""});
  const [newSb, setNewSb] = useState({staffId:"",note:""});
  const [newRule, setNewRule] = useState({title:"",content:""});
  const [newStaff, setNewStaff] = useState({name:"",role:"receptionist",hourlyRate:45,pin:""});
  const [reallocTo, setReallocTo] = useState("");

  useEffect(function() {
    db.ref("shifts").on("value", function(s){const d=s.val();setShifts(d?Object.values(d):[]); });
    db.ref("standbys").on("value", function(s){const d=s.val();setStandbys(d?Object.values(d):[]);});
    db.ref("clockEvents").on("value", function(s){const d=s.val();setClocks(d?Object.values(d):[]);});
    db.ref("rules").on("value", function(s){const d=s.val();setRules(d?Object.values(d):RULES0);});
    db.ref("staff").on("value", function(s){const d=s.val();if(d)setStaff(Object.values(d));});
    db.ref("genMonths").on("value", function(s){const d=s.val();setGenMonths(d?Object.values(d):[]);setReady(true);});
  }, []);

  useEffect(function() {
    if (!ready) return;
    db.ref("staff").once("value").then(function(s){if(!s.val()){STAFF0.forEach(function(m){db.ref("staff/"+m.id).set(m);});}});
    db.ref("rules").once("value").then(function(s){if(!s.val()){RULES0.forEach(function(r){db.ref("rules/"+r.id).set(r);});}});
  }, [ready]);

  useEffect(function() {
    if (!ready) return;
    const key = vm+"-"+vy;
    if (genMonths.indexOf(key) !== -1) return;
    const ns = genRecurring(vm, vy, STAFF0);
    ns.forEach(function(s){db.ref("shifts/"+s.id).set(s);});
    db.ref("genMonths/"+key.replace("-","_")).set(key);
  }, [vm, vy, ready]);

  const recs = staff.filter(function(s){return s.role==="receptionist";});

  function login() {
    const f = staff.find(function(s){return s.name.toLowerCase()===loginName.toLowerCase()&&s.pin===loginPin;});
    if (f){setUser(f);setLoginErr("");}
    else if (loginName==="admin"&&loginPin==="admin123"){setUser({id:0,name:"Admin",role:"admin"});setLoginErr("");}
    else setLoginErr("Incorrect name or PIN.");
  }

  function logout(){setUser(null);setLoginName("");setLoginPin("");setClinician(null);}

  function dayShifts(d,m,y){return shifts.filter(function(s){return s.day===d&&s.month===m&&s.year===y;});}
  function daySBs(d,m,y){return standbys.filter(function(s){return s.day===d&&s.month===m&&s.year===y;});}
  function myShifts(uid){return shifts.filter(function(s){return s.staffId===uid;});}
  function mySBs(uid){return standbys.filter(function(s){return s.staffId===uid;});}

  function clockIn(shiftId){
    if(clocks.find(function(c){return c.shiftId===shiftId&&!c.clockOut;}))return;
    const ev={id:genId(),shiftId,clockIn:new Date().toISOString(),clockOut:null,approved:false};
    db.ref("clockEvents/"+ev.id).set(ev);
  }
  function clockOut(shiftId){
    const ev=clocks.find(function(c){return c.shiftId===shiftId&&!c.clockOut;});
    if(ev)db.ref("clockEvents/"+ev.id).update({clockOut:new Date().toISOString()});
  }
  function approve(evId,by){db.ref("clockEvents/"+evId).update({approved:true,approvedBy:by});}
  function delShift(id){db.ref("shifts/"+id).remove();}
  function delSB(id){db.ref("standbys/"+id).remove();}
  function delRule(id){db.ref("rules/"+id).remove();}
  function delStaff(id){db.ref("staff/"+id).remove();}

  function addShift(){
    if(!newShift.staffId||!shiftMod)return;
    const t=SHIFTS.find(function(x){return x.id===newShift.shiftType;});

    db.ref("shifts/"+s.id).set(s);
    setShiftMod(null);setNewShift({staffId:"",shiftType:"morning_early",station:"H - Hospital",note:""});
  }
  function addSB(){
    if(!newSb.staffId||!sbMod)return;
    const s={id:genId(),staffId:parseInt(newSb.staffId),day:sbMod.day,month:sbMod.month,year:sbMod.year,note:newSb.note};
    db.ref("standbys/"+s.id).set(s);
    setSbMod(null);setNewSb({staffId:"",note:""});
  }
  function doRealloc(){
    if(!reallocTo||!reallocMod)return;
    db.ref("shifts/"+reallocMod.id).update({staffId:parseInt(reallocTo)});
    setReallocMod(null);setReallocTo("");
  }
  function saveRule(){
    const r=ruleMod==="new"?{id:genId(),...newRule}:{id:ruleMod,...newRule};
    db.ref("rules/"+r.id).set(r);
    setRuleMod(null);setNewRule({title:"",content:""});
  }
  function saveStaff(){
    if(!newStaff.name||!newStaff.pin)return;
    const s={...newStaff,id:Date.now(),hourlyRate:parseFloat(newStaff.hourlyRate)};
    db.ref("staff/"+s.id).set(s);
    setAddStaffOpen(false);setNewStaff({name:"",role:"receptionist",hourlyRate:45,pin:""});
  }
  function saveRate(id){
    const v=parseFloat(editRateVal);
    if(!isNaN(v)&&v>=0)db.ref("staff/"+id).update({hourlyRate:v});
    setEditRateId(null);setEditRateVal("");
  }

  function payroll(m,y){
    return recs.map(function(r){
      const ms=shifts.filter(function(s){return s.staffId===r.id&&s.month===m&&s.year===y;});
      let h=0;
      ms.forEach(function(sh){const ev=clocks.find(function(c){return c.shiftId===sh.id&&c.clockOut;});if(ev)h+=calcH(ev.clockIn,ev.clockOut);});
      return Object.assign({},r,{hrs:Math.round(h*100)/100,pay:Math.round(h*r.hourlyRate*100)/100,cnt:ms.length});
    });
  }

  // Styles
  const card = {background:"#fff",border:"0.5px solid #dde3ee",borderRadius:12,padding:"14px 16px",marginBottom:10};
  function btn(a){return {padding:"7px 14px",borderRadius:8,border:"0.5px solid #c8d0e0",cursor:"pointer",fontSize:13,background:a?B:"#f0f3fa",color:a?"#fff":"#1a1a2e",fontWeight:a?500:400};}
  const mi = {padding:"7px 10px",borderRadius:8,border:"0.5px solid rgba(255,255,255,0.3)",fontSize:13,width:"100%",background:"rgba(255,255,255,0.15)",color:"#fff"};
  const li = {padding:"7px 10px",borderRadius:8,border:"0.5px solid #c8d0e0",fontSize:13,width:"100%",background:"#f8f9fc",color:"#1a1a2e"};
  const ml = {fontSize:12,color:"rgba(255,255,255,0.75)",display:"block",marginBottom:4};
  function mb(p){return {padding:"9px 0",borderRadius:8,border:p?"none":"0.5px solid rgba(255,255,255,0.4)",cursor:"pointer",fontSize:13,background:p?"#fff":"transparent",color:p?B:"#fff",fontWeight:p?600:400,flex:1};}
  function tag(c){return {display:"inline-block",padding:"2px 8px",borderRadius:6,fontSize:11,fontWeight:500,background:c+"22",color:c};}

  function Modal({children,onClose}){
    return (
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>

          <button onClick={onClose} style={{position:"absolute",top:12,right:16,background:"none",border:"none",fontSize:20,cursor:"pointer",color:"rgba(255,255,255,0.7)"}}>x</button>

      </div>

    return (

          </div>
          <div>

        </div>
        <button style={btn(false)} onClick={logout}>Sign out</button>

  }

  if (!ready) {

        <div style={{background:B,borderRadius:12,width:56,height:56,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{color:"#fff",fontWeight:800,fontSize:16}}>FVH</span>
        </div>
        <div style={{fontSize:14,color:"#888"}}>Connecting to database...</div>
      </div>
    );
  }

  if (!user) {
    return (
      <div style={{minHeight:500,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{width:360,background:"#fff",borderRadius:16,padding:28,boxShadow:"0 4px 24px rgba(30,58,110,0.12)"}}>
          <div style={{background:B,borderRadius:10,padding:"24px 20px",textAlign:"center",marginBottom:24}}>
            <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",background:"rgba(255,255,255,0.15)",borderRadius:12,width:56,height:56,marginBottom:12}}>
              <span style={{color:"#fff",fontWeight:800,fontSize:20}}>FVH</span>
            </div>
            <div style={{color:"#fff",fontWeight:700,fontSize:18}}>Fourways Vet Hospital</div>
            <div style={{color:"rgba(255,255,255,0.7)",fontSize:11,marginTop:3}}>&amp; Specialist Referral Centre</div>
            <div style={{marginTop:10}}><span style={{background:"rgba(255,255,255,0.2)",color:"#fff",borderRadius:20,padding:"3px 14px",fontSize:11}}>Reception Shift Manager</span></div>
          </div>
          <div style={{fontWeight:600,fontSize:16,marginBottom:2}}>Welcome back</div>
          <div style={{fontSize:12,color:"#888",marginBottom:16}}>Sign in to view your shifts</div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,color:"#555",display:"block",marginBottom:4}}>Name</label>
            <input style={li} placeholder="Your name or admin" value={loginName} onChange={function(e){setLoginName(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")login();}} />
          </div>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,color:"#555",display:"block",marginBottom:4}}>PIN</label>

          </div>

            Admin: <strong>admin</strong> / <strong>admin123</strong><br/>
            Vet: <strong>Vet Login</strong> / <strong>0001</strong><br/>
            Nurse: <strong>Nurse Login</strong> / <strong>0002</strong>
          </div>
        </div>
      </div>
    );
  }

  // ── RECEPTIONIST ──────────────────────────────────────────────
  if (user.role === "receptionist") {
    const uid = user.id;
    const ms = myShifts(uid);
    const thisMon = ms.filter(function(s){return s.month===today.getMonth()&&s.year===today.getFullYear();});
    let totH = 0;
    thisMon.forEach(function(sh){const ev=clocks.find(function(c){return c.shiftId===sh.id&&c.clockOut;});if(ev)totH+=calcH(ev.clockIn,ev.clockOut);});
    const next = ms.filter(function(s){return new Date(s.year,s.month,s.day)>=new Date(today.getFullYear(),today.getMonth(),today.getDate());}).sort(function(a,b){return new Date(a.year,a.month,a.day)-new Date(b.year,b.month,b.day);})[0];
    const nextEv = next?clocks.find(function(c){return c.shiftId===next.id;}):null;

    const dim = daysInMonth(vy,vm);
    const fd = firstDay(vy,vm);
    const cells = [];
    for(let i=0;i<fd;i++)cells.push(null);
    for(let d=1;d<=dim;d++)cells.push(d);

    const wkStart = new Date(today.getFullYear(),today.getMonth(),today.getDate()+wkOff*7);
    wkStart.setDate(wkStart.getDate()-wkStart.getDay());
    const wkDays = [];
    for(let i=0;i<7;i++){const d=new Date(wkStart);d.setDate(d.getDate()+i);wkDays.push(d);}

    return (
      <div>

              const k=g.year+"-"+g.month+"-"+g.day;
              const dl=new Date(g.year,g.month,g.day).toLocaleDateString("en-ZA",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
              const isT=g.day===today.getDate()&&g.month===today.getMonth()&&g.year===today.getFullYear();
              const sbs=daySBs(g.day,g.month,g.year);
              return (
                <div key={k} style={{marginBottom:20}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <div style={{fontWeight:600,fontSize:13,color:isT?B:"#1a1a2e"}}>{dl}</div>
                    {isT&&<span style={{...tag(B),fontSize:10}}>Today</span>}
                    <div style={{flex:1,height:"0.5px",background:"#dde3ee"}}/>
                    <span style={{fontSize:11,color:"#888"}}>{g.shifts.length} shift{g.shifts.length!==1?"s":""}{sbs.length>0?" + "+sbs.length+" SB":""}</span>
                  </div>
                  {subTab==="roster"&&(
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:8}}>
                      {g.shifts.map(function(sh){const m=staff.find(function(s){return s.id===sh.staffId;});const col=shiftColor(sh.shiftType,sh.year,sh.month,sh.day);const ev=clocks.find(function(c){return c.shiftId===sh.id;});return <div key={sh.id} style={{background:col.bg,borderRadius:10,padding:"10px 12px",borderLeft:"4px solid "+col.border}}><div style={{fontWeight:600,fontSize:13,color:col.text}}>{m&&m.name}</div><div style={{fontSize:11,color:col.text,opacity:0.85,marginTop:2}}>{col.label} - {sh.shiftLabel}</div><div style={{fontSize:11,color:col.text,opacity:0.75}}>{sh.shiftTime}</div><div style={{fontSize:10,color:col.text,opacity:0.65,marginTop:2}}>{sh.station}{sh.recurring?" *":""}</div>{ev&&<div style={{marginTop:4}}>{ev.approved&&<span style={{fontSize:10,background:"rgba(16,185,129,0.2)",color:"#065F46",borderRadius:4,padding:"2px 6px"}}>Approved</span>}{ev.clockOut&&!ev.approved&&<span style={{fontSize:10,background:"rgba(55,138,221,0.2)",color:"#185FA5",borderRadius:4,padding:"2px 6px"}}>Out</span>}{ev.clockIn&&!ev.clockOut&&<span style={{fontSize:10,background:"rgba(186,117,23,0.2)",color:"#92400E",borderRadius:4,padding:"2px 6px"}}>In</span>}</div>}</div>;})}
                      {sbs.map(function(sb){const m=staff.find(function(s){return s.id===sb.staffId;});return <div key={sb.id} style={{background:SBC.bg,borderRadius:10,padding:"10px 12px",borderLeft:"4px solid "+SBC.border}}><div style={{fontWeight:600,fontSize:13,color:SBC.text}}>{m&&m.name}</div><div style={{fontSize:11,color:SBC.text,opacity:0.85,marginTop:2}}>Standby</div></div>;})}
                    </div>
                  )}
                  {subTab==="reallocate"&&(
                    <div>
                      {g.shifts.map(function(sh){const m=staff.find(function(s){return s.id===sh.staffId;});const col=shiftColor(sh.shiftType,sh.year,sh.month,sh.day);return <div key={sh.id} style={{...card,display:"flex",justifyContent:"space-between",alignItems:"center",borderLeft:"4px solid "+col.border,marginBottom:6}}><div><div style={{fontWeight:500}}>{m&&m.name}</div><div style={{fontSize:12,color:col.text}}>{col.label} - {sh.shiftLabel} - {sh.shiftTime}</div></div><div style={{display:"flex",gap:6}}><button style={{...btn(true),fontSize:11,padding:"5px 10px",background:B,color:"#fff",border:"none"}} onClick={function(){setReallocMod(sh);setReallocTo("");}}>Reallocate</button><button style={{...btn(false),fontSize:11,padding:"5px 10px",color:"#c0392b"}} onClick={function(){delShift(sh.id);}}>Remove</button></div></div>;})}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {adminTab==="payroll" && (
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
              <button style={btn(false)} onClick={function(){if(payM===0){setPayM(11);setPayY(function(y){return y-1;});}else setPayM(function(m){return m-1;});}}>prev</button>
              <span style={{fontWeight:500}}>{pmn}</span>
              <button style={btn(false)} onClick={function(){if(payM===11){setPayM(0);setPayY(function(y){return y+1;});}else setPayM(function(m){return m+1;});}}>next</button>
            </div>
            <div style={card}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr style={{borderBottom:"0.5px solid #dde3ee"}}>{["Name","Shifts","Hours","Rate","Total Pay"].map(function(h){return <th key={h} style={{textAlign:"left",padding:"6px 8px",fontSize:11,color:"#888",fontWeight:500}}>{h}</th>;})}</tr></thead>
                <tbody>{pd.map(function(r){return <tr key={r.id} style={{borderBottom:"0.5px solid #eee"}}><td style={{padding:"8px",fontWeight:500}}>{r.name}</td><td style={{padding:"8px"}}>{r.cnt}</td><td style={{padding:"8px"}}>{r.hrs.toFixed(2)}</td><td style={{padding:"8px"}}>R {r.hourlyRate.toFixed(2)}</td><td style={{padding:"8px",fontWeight:500,color:B}}>R {r.pay.toFixed(2)}</td></tr>;})}</tbody>
                <tfoot><tr style={{borderTop:"1.5px solid "+B}}><td colSpan={2} style={{padding:"8px",fontWeight:500}}>Total</td><td style={{padding:"8px",fontWeight:500}}>{pd.reduce(function(a,r){return a+r.hrs;},0).toFixed(2)}</td><td/><td style={{padding:"8px",fontWeight:500,color:B}}>R {pd.reduce(function(a,r){return a+r.pay;},0).toFixed(2)}</td></tr></tfoot>
              </table>
            </div>
            <button style={{...btn(true),background:B,color:"#fff",border:"none",marginTop:14,padding:"10px 20px"}} onClick={function(){
              const rows=[["Name","Shifts","Hours","Rate","Total Pay"],...pd.map(function(r){return [r.name,r.cnt,r.hrs.toFixed(2),r.hourlyRate.toFixed(2),r.pay.toFixed(2)];}),["TOTAL","",pd.reduce(function(a,r){return a+r.hrs;},0).toFixed(2),"",pd.reduce(function(a,r){return a+r.pay;},0).toFixed(2)]];
              const csv=rows.map(function(r){return r.map(function(v){return '"'+v+'"';}).join(",");}).join("\n");
              const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);
              const a=document.createElement("a");a.href=url;a.download="FVH_Payroll_"+pmn.replace(" ","_")+".csv";a.click();URL.revokeObjectURL(url);
            }}>Download CSV</button>
          </div>
        )}

        {adminTab==="staff" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontWeight:500}}>Staff profiles</div>
              <button style={{...btn(true),background:B,color:"#fff",border:"none"}} onClick={function(){setAddStaffOpen(true);}}>+ Add Staff</button>
            </div>
            {staff.map(function(m){return (
              <div key={m.id} style={{...card,padding:"12px 16px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:36,height:36,borderRadius:"50%",background:B+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:500,color:B}}>{m.name[0]}</div>
                    <div><div style={{fontWeight:500,fontSize:14}}>{m.name}</div><span style={{...tag("#1e3a6e"),fontSize:10,padding:"1px 6px"}}>{m.role}</span></div>
                  </div>
                  {m.role==="receptionist"&&(
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      {editRateId===m.id?(
                        <>
                          <span style={{fontSize:13,color:"#888"}}>R</span>
                          <input type="number" autoFocus style={{...li,width:80,padding:"5px 8px"}} value={editRateVal} onChange={function(e){setEditRateVal(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")saveRate(m.id);}}/>
                          <span style={{fontSize:13,color:"#888"}}>/hr</span>
                          <button style={{...btn(true),padding:"5px 12px",fontSize:12}} onClick={function(){saveRate(m.id);}}>Save</button>
                          <button style={{...btn(false),padding:"5px 12px",fontSize:12}} onClick={function(){setEditRateId(null);}}>Cancel</button>
                        </>
                      ):(
                        <>
                          <span style={{fontSize:14,fontWeight:500,color:B}}>R {m.hourlyRate}/hr</span>
                          <button style={{...btn(false),padding:"5px 12px",fontSize:12}} onClick={function(){setEditRateId(m.id);setEditRateVal(m.hourlyRate);}}>Edit rate</button>
                        </>
                      )}
                      <button style={{...btn(false),padding:"5px 10px",fontSize:12,color:"#c0392b"}} onClick={function(){if(window.confirm("Remove "+m.name+"?"))delStaff(m.id);}}>Delete</button>
                    </div>
                  )}
                </div>
              </div>
            );})}
          </div>
        )}

        {adminTab==="rules" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontWeight:500}}>Rules and Protocols</div>
              <button style={{...btn(true),background:B,color:"#fff",border:"none"}} onClick={function(){setRuleMod("new");setNewRule({title:"",content:""});}}>+ Add Rule</button>
            </div>
            {rules.map(function(r){return (
              <div key={r.id} style={{...card,borderLeft:"4px solid "+B}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <div style={{fontWeight:500}}>{r.title}</div>
                  <div style={{display:"flex",gap:6}}>
                    <button style={{...btn(false),fontSize:11,padding:"4px 8px"}} onClick={function(){setRuleMod(r.id);setNewRule({title:r.title,content:r.content});}}>Edit</button>
                    <button style={{...btn(false),fontSize:11,padding:"4px 8px",color:"#c0392b"}} onClick={function(){delRule(r.id);}}>Delete</button>
                  </div>
                </div>
                <div style={{fontSize:12,color:"#666",whiteSpace:"pre-wrap",lineHeight:1.6}}>{r.content}</div>
              </div>
            );})}
          </div>
        )}

        {shiftMod&&<Modal onClose={function(){setShiftMod(null);}}>
          <div style={{fontWeight:600,marginBottom:16,fontSize:15,color:"#fff"}}>Add shift - {new Date(shiftMod.year,shiftMod.month,shiftMod.day).toLocaleDateString("en-ZA",{day:"numeric",month:"long"})}</div>
          <div style={{marginBottom:12}}><label style={ml}>Staff member</label><select style={mi} value={newShift.staffId} onChange={function(e){setNewShift(function(p){return Object.assign({},p,{staffId:e.target.value});});}}><option value="">Select...</option>{recs.map(function(r){return <option key={r.id} value={r.id}>{r.name}</option>;})}</select></div>
          <div style={{marginBottom:12}}><label style={ml}>Shift type</label><select style={mi} value={newShift.shiftType} onChange={function(e){setNewShift(function(p){return Object.assign({},p,{shiftType:e.target.value});});}}>{SHIFTS.map(function(t){return <option key={t.id} value={t.id}>{t.label} ({t.time})</option>;})}</select></div>
          <div style={{marginBottom:12}}><label style={ml}>Station</label><select style={mi} value={newShift.station} onChange={function(e){setNewShift(function(p){return Object.assign({},p,{station:e.target.value});});}}>{STATIONS.map(function(s){return <option key={s}>{s}</option>;})}</select></div>
          <div style={{marginBottom:16}}><label style={ml}>Note</label><input style={mi} value={newShift.note} onChange={function(e){setNewShift(function(p){return Object.assign({},p,{note:e.target.value});});}}/></div>
          <div style={{display:"flex",gap:8}}><button style={mb(true)} onClick={addShift}>Add Shift</button><button style={mb(false)} onClick={function(){setShiftMod(null);}}>Cancel</button></div>
        </Modal>}

        {sbMod&&<Modal onClose={function(){setSbMod(null);}}>
          <div style={{fontWeight:600,marginBottom:16,fontSize:15,color:"#fff"}}>Add Standby - {new Date(sbMod.year,sbMod.month,sbMod.day).toLocaleDateString("en-ZA",{day:"numeric",month:"long"})}</div>
          <div style={{marginBottom:12}}><label style={ml}>Staff member</label><select style={mi} value={newSb.staffId} onChange={function(e){setNewSb(function(p){return Object.assign({},p,{staffId:e.target.value});});}}><option value="">Select...</option>{recs.map(function(r){return <option key={r.id} value={r.id}>{r.name}</option>;})}</select></div>
          <div style={{marginBottom:16}}><label style={ml}>Note (optional)</label><input style={mi} value={newSb.note} onChange={function(e){setNewSb(function(p){return Object.assign({},p,{note:e.target.value}});}}/></div>
          <div style={{display:"flex",gap:8}}><button style={mb(true)} onClick={addSB}>Confirm</button><button style={mb(false)} onClick={function(){setSbMod(null);}}>Cancel</button></div>
        </Modal>}

        {reallocMod&&<Modal onClose={function(){setReallocMod(null);}}>
          <div style={{fontWeight:600,marginBottom:16,fontSize:15,color:"#fff"}}>Reallocate - {reallocMod.shiftLabel}</div>
          <div style={{marginBottom:16}}><label style={ml}>Reassign to</label><select style={mi} value={reallocTo} onChange={function(e){setReallocTo(e.target.value);}}><option value="">Select...</option>{recs.map(function(r){return <option key={r.id} value={r.id}>{r.name}</option>;})}</select></div>
          <div style={{display:"flex",gap:8}}><button style={mb(true)} onClick={doRealloc}>Confirm</button><button style={mb(false)} onClick={function(){setReallocMod(null);}}>Cancel</button></div>
        </Modal>}

        {ruleMod&&<Modal onClose={function(){setRuleMod(null);}}>
          <div style={{fontWeight:600,marginBottom:16,fontSize:15,color:"#fff"}}>{ruleMod==="new"?"Add rule":"Edit rule"}</div>
          <div style={{marginBottom:12}}><label style={ml}>Title</label><input style={mi} value={newRule.title} onChange={function(e){setNewRule(function(p){return Object.assign({},p,{title:e.target.value});});}}/></div>
          <div style={{marginBottom:16}}><label style={ml}>Content</label><textarea style={{...mi,height:120,resize:"vertical"}} value={newRule.content} onChange={function(e){setNewRule(function(p){return Object.assign({},p,{content:e.target.value});});}}/></div>
          <div style={{display:"flex",gap:8}}><button style={mb(true)} onClick={saveRule}>Save</button><button style={mb(false)} onClick={function(){setRuleMod(null);}}>Cancel</button></div>
        </Modal>}

        {addStaffOpen&&<Modal onClose={function(){setAddStaffOpen(false);}}>
          <div style={{fontWeight:600,marginBottom:16,fontSize:15,color:"#fff"}}>Add new staff member</div>
          <div style={{marginBottom:12}}><label style={ml}>Name</label><input style={mi} value={newStaff.name} onChange={function(e){setNewStaff(function(p){return Object.assign({},p,{name:e.target.value});});}}/></div>
          <div style={{marginBottom:12}}><label style={ml}>PIN</label><input type="password" style={mi} value={newStaff.pin} onChange={function(e){setNewStaff(function(p){return Object.assign({},p,{pin:e.target.value});});}}/></div>
          <div style={{marginBottom:12}}><label style={ml}>Role</label><select style={mi} value={newStaff.role} onChange={function(e){setNewStaff(function(p){return Object.assign({},p,{role:e.target.value});});}}><option value="receptionist">Receptionist</option><option value="vet">Vet</option><option value="nurse">Nurse</option></select></div>
          {newStaff.role==="receptionist"&&<div style={{marginBottom:12}}><label style={ml}>Hourly Rate (R)</label><input type="number" style={mi} value={newStaff.hourlyRate} onChange={function(e){setNewStaff(function(p){return Object.assign({},p,{hourlyRate:e.target.value});})}}/></div>}
          <div style={{display:"flex",gap:8}}><button style={mb(true)} onClick={saveStaff}>Add</button><button style={mb(false)} onClick={function(){setAddStaffOpen(false);}}>Cancel</button></div>
        </Modal>}
      </div>
    );
  }

  // ── VET / NURSE ───────────────────────────────────────────────
  if (user.role==="vet"||user.role==="nurse") {
    const nameList = user.role==="vet"?VETS:NURSES;
    const tStr = today.toDateString();
    const tds = dayShifts(today.getDate(),today.getMonth(),today.getFullYear());
    const pendEvs = clocks.filter(function(c){
      if(c.approved||!c.clockOut)return false;
      const sh=shifts.find(function(s){return s.id===c.shiftId;});
      return sh&&new Date(sh.year,sh.month,sh.day).toDateString()===tStr;
    });

    if (!clinician) {
      return (
        <div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 0 16px",borderBottom:"0.5px solid #dde3ee",marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{background:B,borderRadius:8,width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontWeight:700,fontSize:13}}>FVH</span></div>
              <div><div style={{fontWeight:500,fontSize:14}}>Fourways Vet Hospital</div><div style={{fontSize:11,color:"#888"}}>{user.role==="vet"?"Veterinarian":"Nurse"} login</div></div>
            </div>
            <button style={btn(false)} onClick={logout}>Sign out</button>
          </div>
          <div style={{...card,textAlign:"center",padding:"20px",marginBottom:16}}>
            <div style={{fontWeight:600,fontSize:16,marginBottom:4}}>Who are you?</div>
            <div style={{fontSize:13,color:"#888"}}>Select your name to continue</div>
          </div>
          {nameList.length===0&&<div style={{...card,color:"#888",fontSize:13,textAlign:"center"}}>No names loaded yet.</div>}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(175px,1fr))",gap:8}}>
            {nameList.map(function(name){return (
              <button key={name} onClick={function(){setClinician(name);}} style={{background:"#fff",border:"0.5px solid #c8d0e0",borderRadius:10,padding:"14px 16px",cursor:"pointer",textAlign:"left"}}>
                <div style={{width:32,height:32,borderRadius:"50%",background:B+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:B,marginBottom:8}}>{name[0]}</div>
                <div style={{fontWeight:500,fontSize:13}}>{name}</div>
                <div style={{fontSize:11,color:"#888",marginTop:2}}>{user.role==="vet"?"Veterinarian":"Nurse"}</div>
              </button>
            );})}
          </div>
        </div>
      );
    }

    return (
      <div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 0 16px",borderBottom:"0.5px solid #dde3ee",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{background:B,borderRadius:8,width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontWeight:700,fontSize:13}}>FVH</span></div>
            <div><div style={{fontWeight:500,fontSize:14}}>{clinician}</div><div style={{fontSize:11,color:"#888"}}><span style={{...tag(B),fontSize:10}}>{user.role}</span></div></div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button style={{...btn(false),fontSize:12}} onClick={function(){setClinician(null);}}>Change name</button>
            <button style={btn(false)} onClick={function(){setClinician(null);logout();}}>Sign out</button>
          </div>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:16}}>
          {["approvals","roster"].map(function(t){return <button key={t} style={btn(vetTab===t)} onClick={function(){setVetTab(t);}}>{t==="approvals"?"Approvals"+(pendEvs.length>0?" ("+pendEvs.length+")":""):"Today's Roster"}</button>;})}
        </div>
        {vetTab==="approvals"&&(
          <div>
            <div style={{fontWeight:500,marginBottom:12}}>Pending approvals</div>
            {pendEvs.length===0&&<div style={{color:"#888",fontSize:13}}>No pending approvals</div>}
            {pendEvs.map(function(ev){const sh=shifts.find(function(s){return s.id===ev.shiftId;});const mem=sh?staff.find(function(s){return s.id===sh.staffId;}):null;const col=sh?shiftColor(sh.shiftType,sh.year,sh.month,sh.day):SC.morning;return <div key={ev.id} style={{...card,borderLeft:"4px solid "+col.border}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:500}}>{mem&&mem.name}</div><div style={{fontSize:12,color:col.text}}>{sh&&sh.shiftLabel} - {sh&&sh.shiftTime}</div><div style={{fontSize:11,color:"#888",marginTop:2}}>In: {fmt(ev.clockIn)} - Out: {fmt(ev.clockOut)} - {calcH(ev.clockIn,ev.clockOut).toFixed(2)}h</div><div style={{fontSize:11,color:"#888",fontStyle:"italic"}}>Approving as: {clinician}</div></div><button style={{...btn(true),background:"#0f6e56",border:"none",padding:"8px 16px"}} onClick={function(){approve(ev.id,clinician);}}>Approve</button></div></div>;})}
          </div>
        )}
        {vetTab==="roster"&&(
          <div>
            <div style={{fontWeight:500,marginBottom:12}}>Today - {today.toLocaleDateString("en-ZA",{weekday:"long",day:"numeric",month:"long"})}</div>
            {tds.length===0&&<div style={{color:"#888",fontSize:13}}>No shifts today</div>}
            {tds.map(function(sh){const m=staff.find(function(s){return s.id===sh.staffId;});const ev=clocks.find(function(c){return c.shiftId===sh.id;});const col=shiftColor(sh.shiftType,sh.year,sh.month,sh.day);return <div key={sh.id} style={{...card,display:"flex",justifyContent:"space-between",alignItems:"center",borderLeft:"4px solid "+col.border}}><div><div style={{fontWeight:500}}>{m&&m.name}</div><div style={{fontSize:12,color:col.text}}>{sh.shiftTime} - {sh.station}</div></div><div>{ev&&ev.approved?<span style={tag("#0f6e56")}>Approved</span>:ev&&ev.clockOut?<span style={tag("#378add")}>Clocked out</span>:ev&&ev.clockIn?<span style={tag("#ba7517")}>Clocked in</span>:<span style={{color:"#888",fontSize:12}}>Not clocked in</span>}</div></div>;})}
          </div>
        )}
      </div>
    );
  }

  return null;
}

ReactDOM.render(React.createElement(App, null), document.getElementById("root"));
</script>
</body>
</html>
