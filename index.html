// ── STATE ───────────────────────────────────────────────────────
var state = {

// ── HELPERS ─────────────────────────────────────────────────────
function genId(){return Math.random().toString(36).substr(2,9);}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function firstDay(y,m){return new Date(y,m,1).getDay();}
function calcH(i,o){if(!i||!o)return 0;return Math.round((new Date(o)-new Date(i))/3600000*100)/100;}
function fmt(iso){if(!iso)return "-";return new Date(iso).toLocaleString("en-ZA",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});}
function shiftCol(type,y,m,d){var dow=new Date(y,m,d).getDay();if(dow===0||dow===6)return SC.weekend;var t=SHIFT_TYPES.find(function(s){return s.id===type;});return SC[(t?t.cat:"morning")]||SC.morning;}
function today(){return new Date();}
function set(key,val){
  if(typeof key==="object"){Object.assign(state,key);}else{state[key]=val;}
  render();
}

// ── FIREBASE ────────────────────────────────────────────────────
function initFirebase(){
  db.ref("shifts").on("value",function(s){var d=s.val();state.shifts=d?Object.values(d):[];render();});
  db.ref("standbys").on("value",function(s){var d=s.val();state.standbys=d?Object.values(d):[];render();});
  db.ref("clockEvents").on("value",function(s){var d=s.val();state.clocks=d?Object.values(d):[];render();});
  db.ref("rules").on("value",function(s){var d=s.val();state.rules=d?Object.values(d):RULES0.slice();render();});
  db.ref("staff").on("value",function(s){var d=s.val();if(d)state.staff=Object.values(d);render();});
  db.ref("genMonths").on("value",function(s){
    var d=s.val();state.genMonths=d?Object.values(d):[];state.ready=true;
    db.ref("staff").once("value").then(function(ss){if(!ss.val()){STAFF0.forEach(function(m){db.ref("staff/"+m.id).set(m);});}});
    db.ref("rules").once("value").then(function(ss){if(!ss.val()){RULES0.forEach(function(r){db.ref("rules/"+r.id).set(r);});}});
    genRecurringIfNeeded();
    render();
  });
}

function genRecurringIfNeeded(){
  var key=state.vm+"-"+state.vy;
  if(state.genMonths.indexOf(key)!==-1)return;
  var days=daysInMonth(state.vy,state.vm);
  var wk=0;
  for(var day=1;day<=days;day++){
    var dow=new Date(state.vy,state.vm,day).getDay();
    if(dow===1)wk++;
    if(dow===0||dow===6)continue;
    var wi=Math.min(wk,4)-1;
    var mr=MR[Math.max(wi,0)]||MR[0];
    var ar=AR[Math.max(wi,0)]||AR[0];
    MS.forEach(function(sd,i){
      var mem=STAFF0.find(function(s){return s.name===sd.name;});
      if(!mem)return;
      var sh={id:genId(),staffId:mem.id,day:day,month:state.vm,year:state.vy,shiftType:sd.type,shiftLabel:sd.label,shiftTime:sd.time,station:mr[i]||"H - Hospital",note:"",recurring:true};
      db.ref("shifts/"+sh.id).set(sh);
    });
    AS.forEach(function(sd,i){
      var mem=STAFF0.find(function(s){return s.name===sd.name;});
      if(!mem)return;
      var sh={id:genId(),staffId:mem.id,day:day,month:state.vm,year:state.vy,shiftType:sd.type,shiftLabel:sd.label,shiftTime:sd.time,station:ar[i]||"M - Middle",note:"",recurring:true};
      db.ref("shifts/"+sh.id).set(sh);
    });
  }
  db.ref("genMonths/"+key.replace("-","_")).set(key);
}

// ── ACTIONS ─────────────────────────────────────────────────────
function login(){
  var f=state.staff.find(function(s){return s.name.toLowerCase()===state.loginName.toLowerCase()&&s.pin===state.loginPin;});
  if(f){set({user:f,loginErr:""});}
  else if(state.loginName==="admin"&&state.loginPin==="admin123"){set({user:{id:0,name:"Admin",role:"admin"},loginErr:""});}
  else set("loginErr","Incorrect name or PIN.");
}
function logout(){set({user:null,loginName:"",loginPin:"",clinician:null});}
function clockIn(shiftId){
  if(state.clocks.find(function(c){return c.shiftId===shiftId&&!c.clockOut;}))return;
  var ev={id:genId(),shiftId:shiftId,clockIn:new Date().toISOString(),clockOut:null,approved:false};
  db.ref("clockEvents/"+ev.id).set(ev);
}
function clockOut(shiftId){
  var ev=state.clocks.find(function(c){return c.shiftId===shiftId&&!c.clockOut;});
  if(ev)db.ref("clockEvents/"+ev.id).update({clockOut:new Date().toISOString()});
}
function approveEv(evId,by){db.ref("clockEvents/"+evId).update({approved:true,approvedBy:by});}
function delShift(id){db.ref("shifts/"+id).remove();}
function delSB(id){db.ref("standbys/"+id).remove();}
function delRule(id){db.ref("rules/"+id).remove();}
function delStaff(id){if(confirm("Remove staff member?"))db.ref("staff/"+id).remove();}
function addShift(){
  var ns=state.newShift;if(!ns.staffId||!state.shiftMod)return;
  var t=SHIFT_TYPES.find(function(x){return x.id===ns.shiftType;});
  var s={id:genId(),staffId:parseInt(ns.staffId),day:state.shiftMod.day,month:state.shiftMod.month,year:state.shiftMod.year,shiftType:ns.shiftType,shiftLabel:t.label,shiftTime:t.time,station:ns.station,note:ns.note};
  db.ref("shifts/"+s.id).set(s);
  set({shiftMod:null,newShift:{staffId:"",shiftType:"morning_early",station:"H - Hospital",note:""}});
}
function addSB(){
  var ns=state.newSb;if(!ns.staffId||!state.sbMod)return;
  var s={id:genId(),staffId:parseInt(ns.staffId),day:state.sbMod.day,month:state.sbMod.month,year:state.sbMod.year,note:ns.note};
  db.ref("standbys/"+s.id).set(s);
  set({sbMod:null,newSb:{staffId:"",note:""}});
}
function doRealloc(){
  if(!state.reallocTo||!state.reallocMod)return;
  db.ref("shifts/"+state.reallocMod.id).update({staffId:parseInt(state.reallocTo)});
  set({reallocMod:null,reallocTo:""});
}
function saveRule(){
  var r=state.ruleMod==="new"?{id:genId(),title:state.newRule.title,content:state.newRule.content}:{id:state.ruleMod,title:state.newRule.title,content:state.newRule.content};
  db.ref("rules/"+r.id).set(r);
  set({ruleMod:null,newRule:{title:"",content:""}});
}
function saveStaff(){
  var ns=state.newStaff;if(!ns.name||!ns.pin)return;
  var s={id:Date.now(),name:ns.name,role:ns.role,hourlyRate:parseFloat(ns.hourlyRate),pin:ns.pin};
  db.ref("staff/"+s.id).set(s);
  set({addStaffOpen:false,newStaff:{name:"",role:"receptionist",hourlyRate:45,pin:""}});
}
function saveRate(id){
  var v=parseFloat(state.editRateVal);
  if(!isNaN(v)&&v>=0)db.ref("staff/"+id).update({hourlyRate:v});
  set({editRateId:null,editRateVal:""});
}

// ── HTML HELPERS ────────────────────────────────────────────────
function e(tag,attrs,children){
  var el=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(function(k){
    if(k==="style"&&typeof attrs[k]==="object"){Object.assign(el.style,attrs[k]);}
    else if(k.startsWith("on")){el.addEventListener(k.slice(2).toLowerCase(),attrs[k]);}
    else if(k==="className"){el.className=attrs[k];}
    else el.setAttribute(k,attrs[k]);
  });
  if(children)children.forEach(function(c){if(c!=null&&c!==false){if(typeof c==="string"||typeof c==="number"){el.appendChild(document.createTextNode(c));}else if(c instanceof Node){el.appendChild(c);}}});
  return el;
}
function div(style,children){return e("div",{style:style},children);}
function btn(label,primary,onClick,extra){
  var b=e("button",{className:"btn"+(primary?" btn-primary":""),onclick:onClick},typeof label==="string"?[label]:label);
  if(extra)Object.assign(b.style,extra);
  return b;
}
function inp(value,onChange,type,placeholder,dark){
  var i=e("input",{className:dark?"inp-dark":"inp",type:type||"text",value:value||"",placeholder:placeholder||""});
  i.addEventListener("input",function(ev){onChange(ev.target.value);});
  return i;
}
function sel(value,options,onChange,dark){
  var s=e("select",{className:dark?"inp-dark":"inp"});
  options.forEach(function(o){
    var val=typeof o==="object"?o.value:o;
    var lab=typeof o==="object"?o.label:o;
    var opt=e("option",{value:val},[lab]);
    if(val==value)opt.selected=true;
    s.appendChild(opt);
  });
  s.addEventListener("change",function(ev){onChange(ev.target.value);});
  return s;
}
function tag(color,text){return e("span",{style:{display:"inline-block",padding:"2px 8px",borderRadius:"6px",fontSize:"11px",fontWeight:"500",background:color+"22",color:color}},[text]);}
function cardEl(children,extra){var d=e("div",{className:"card"},children);if(extra)Object.assign(d.style,extra);return d;}

function shiftCard(sh,showName,showActions,onClockIn,onClockOut,onRealloc,onRemove){
  var col=shiftCol(sh.shiftType,sh.year,sh.month,sh.day);
  var ev=state.clocks.find(function(c){return c.shiftId===sh.id;});
  var mem=state.staff.find(function(s){return s.id===sh.staffId;});
  var inner=[];
  if(showName)inner.push(e("div",{style:{fontWeight:"500",fontSize:"13px"}},[mem?mem.name:"?"]));
  inner.push(e("div",{style:{fontSize:"12px",color:col.text}},[col.label+" - "+sh.shiftLabel+" - "+sh.shiftTime]));
  inner.push(e("div",{style:{fontSize:"11px",color:"#888"}},[sh.station+(sh.note?" - "+sh.note:"")+(sh.recurring?" *":"")]));
  if(ev&&ev.clockIn){inner.push(e("div",{style:{fontSize:"11px",color:"#888",marginTop:"4px"}},["In: "+fmt(ev.clockIn)+(ev.clockOut?" | Out: "+fmt(ev.clockOut)+" | "+calcH(ev.clockIn,ev.clockOut).toFixed(2)+"h":"")]));}
  var badges=[];
  if(ev&&ev.approved)badges.push(tag("#0f6e56","Approved"));
  else if(ev&&ev.clockOut)badges.push(tag("#378add","Pending"));
  else if(ev&&ev.clockIn)badges.push(tag("#ba7517","Clocked in"));
  if(showActions){
    if(!ev&&onClockIn)badges.push(btn("Clock In",true,onClockIn,{fontSize:"11px",padding:"4px 10px"}));
    if(ev&&ev.clockIn&&!ev.clockOut&&onClockOut)badges.push(btn("Clock Out",false,onClockOut,{fontSize:"11px",padding:"4px 10px"}));
    if(onRealloc)badges.push(btn("Reallocate",false,onRealloc,{fontSize:"11px",padding:"4px 8px"}));
    if(onRemove)badges.push(btn("Remove",false,onRemove,{fontSize:"11px",padding:"4px 8px",color:"#c0392b"}));
  }
  var row=div({display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px"},[div({},inner),div({display:"flex",gap:"5px",flexWrap:"wrap",justifyContent:"flex-end",alignItems:"center"},badges)]);
  var d=cardEl([row],{borderLeft:"4px solid "+col.border});
  return d;
}

function modalEl(title,children,onClose){
  var box=div({background:B,borderRadius:"14px",padding:"20px 24px",width:"360px",position:"relative",maxHeight:"85vh",overflowY:"auto"},children);
  var xbtn=e("button",{onclick:onClose,style:{position:"absolute",top:"12px",right:"16px",background:"none",border:"none",fontSize:"20px",cursor:"pointer",color:"rgba(255,255,255,0.7)"}},["\u00d7"]);
  var heading=e("div",{style:{fontWeight:"600",fontSize:"15px",color:"#fff",marginBottom:"16px"}},[title]);
  box.insertBefore(heading,box.firstChild);
  box.insertBefore(xbtn,box.firstChild);
  var bg=div({position:"fixed",inset:"0",background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"200"},[box]);
  return bg;
}

function tabs(options,active,onChange){
  return div({display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"16px"},options.map(function(o){
    var id=typeof o==="object"?o.id:o;
    var lb=typeof o==="object"?o.label:o.charAt(0).toUpperCase()+o.slice(1);
    var b=e("button",{className:"btn"+(id===active?" btn-primary":""),onclick:function(){onChange(id);}},typeof lb==="string"?[lb]:[lb]);
    return b;
  }));
}

// ── RENDER ───────────────────────────────────────────────────────
function render(){
  var app=document.getElementById("app");
  app.innerHTML="";
  if(!state.ready){
    app.appendChild(div({textAlign:"center",padding:"60px 0",color:"#888"},["Connecting to database..."]));
    return;
  }
  if(!state.user){renderLogin(app);return;}
  if(state.user.role==="receptionist"){renderRec(app);return;}
  if(state.user.role==="admin"){renderAdmin(app);return;}
  if(state.user.role==="vet"||state.user.role==="nurse"){renderVet(app);return;}
}

function renderLogin(app){

      div({display:"inline-flex",alignItems:"center",justifyContent:"center",background:"rgba(255,255,255,0.15)",borderRadius:"12px",width:"56px",height:"56px",marginBottom:"12px"},[
        e("span",{style:{color:"#fff",fontWeight:"800",fontSize:"20px"}},["FVH"])
      ]),
      e("div",{style:{color:"#fff",fontWeight:"700",fontSize:"18px"}},["Fourways Vet Hospital"]),
      e("div",{style:{color:"rgba(255,255,255,0.7)",fontSize:"11px",marginTop:"3px"}},["& Specialist Referral Centre"]),
      div({marginTop:"10px"},[e("span",{style:{background:"rgba(255,255,255,0.2)",color:"#fff",borderRadius:"20px",padding:"3px 14px",fontSize:"11px"}},["Reception Shift Manager"])])
    ]),
    e("div",{style:{fontWeight:"600",fontSize:"16px",marginBottom:"2px"}},["Welcome back"]),
    e("div",{style:{fontSize:"12px",color:"#888",marginBottom:"16px"}},["Sign in to view your shifts"]),
    e("label",{style:{fontSize:"12px",color:"#555",display:"block",marginBottom:"4px"}},["Name"]),
    inp(state.loginName,function(v){state.loginName=v;},"text","Your name or admin"),
    e("br",{},[]),
    e("label",{style:{fontSize:"12px",color:"#555",display:"block",marginTop:"10px",marginBottom:"4px"}},["PIN"]),
